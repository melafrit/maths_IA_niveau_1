<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connexion à la plateforme d'examens IPSSI">
  <title>Connexion — Plateforme d'examens IPSSI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/main.css">
</head>
<body>
  <!-- Diagnostic : visible errors if JS/Babel/React fail -->
  <div id="js-errors" style="display:none;background:#fff3cd;color:#856404;padding:12px 16px;margin:12px;border-radius:8px;font-family:monospace;font-size:13px;border:1px solid #ffc107;max-width:600px;margin:12px auto;"></div>

  <div id="root">
    <!-- Fallback visible if React doesn't mount -->
    <div style="max-width:380px;margin:100px auto;text-align:center;font-family:system-ui,sans-serif;">
      <div style="font-size:3rem;margin-bottom:8px;">🎓</div>
      <p style="color:#666;">Chargement de la page de connexion...</p>
      <noscript><p style="color:red;margin-top:12px;">JavaScript est requis pour cette page.</p></noscript>
    </div>
  </div>

  <!-- Plain JS error catcher — runs BEFORE Babel/React -->
  <script>
    window.__jsErrors = [];
    window.onerror = function(msg, url, line, col, err) {
      window.__jsErrors.push(msg + ' (' + url + ':' + line + ')');
      var el = document.getElementById('js-errors');
      if (el) {
        el.style.display = 'block';
        el.innerHTML = '<b>Erreur JS :</b><br>' + window.__jsErrors.join('<br>');
      }
    };
    // Check after 8s if React mounted
    setTimeout(function() {
      var root = document.getElementById('root');
      if (root && root.querySelector('[data-react-mounted]') === null) {
        var el = document.getElementById('js-errors');
        if (el && window.__jsErrors.length === 0) {
          el.style.display = 'block';
          el.innerHTML = '<b>React n\'a pas pu se monter.</b> Essayez Ctrl+Shift+R pour rafraichir.';
        }
      }
    }, 8000);
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="/assets/components-base.js?v=14" type="text/babel"></script>
  <script src="/assets/components-advanced.js?v=14" type="text/babel"></script>
  <script src="/assets/hooks.js?v=14" type="text/babel"></script>
  <script src="/assets/layouts.js?v=14" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { Button, Card, Badge, ToastProvider, useToast } = window.UI;
    const { useAuth, useTranslation } = window.UIHooks;
    const { PublicLayout } = window.UILayouts;

    // =======================================================================
    // Style partagé pour les inputs natifs (bypass composant Input custom)
    // =======================================================================
    const inputStyle = {
      width: '100%',
      padding: '8px 12px',
      fontSize: 'var(--text-base)',
      fontFamily: 'var(--font-sans)',
      color: 'var(--color-text)',
      background: 'var(--color-bg-input)',
      border: '1px solid var(--color-border)',
      borderRadius: 'var(--radius-md)',
      outline: 'none',
      height: '40px',
      boxSizing: 'border-box',
    };

    const labelStyle = {
      display: 'block',
      fontSize: 'var(--text-sm)',
      fontWeight: 'var(--font-medium)',
      color: 'var(--color-text)',
      marginBottom: '6px',
    };

    const errorStyle = {
      fontSize: 'var(--text-sm)',
      color: 'var(--color-danger)',
      marginTop: '4px',
    };

    // =======================================================================
    // LoginPage — utilise des <input> natifs pour fiabilité maximale
    // =======================================================================

    function LoginPage() {
      const { t } = useTranslation();
      const { login, isAuthenticated, loading } = useAuth();
      const { toast } = useToast();

      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [emailError, setEmailError] = useState('');
      const [pwdError, setPwdError] = useState('');
      const [globalError, setGlobalError] = useState('');

      useEffect(() => {
        if (!loading && isAuthenticated) {
          window.location.href = '/admin/dashboard.html';
        }
      }, [loading, isAuthenticated]);

      const validate = () => {
        let valid = true;
        setEmailError(''); setPwdError(''); setGlobalError('');

        if (!email.trim()) {
          setEmailError(t('common.required'));
          valid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
          setEmailError('Format email invalide');
          valid = false;
        }

        if (!password) {
          setPwdError(t('common.required'));
          valid = false;
        } else if (password.length < 8) {
          setPwdError(t('auth.error.weak_password'));
          valid = false;
        }

        return valid;
      };

      const handleSubmit = function(e) {
        if (e) e.preventDefault();
        if (submitting) return;
        if (!validate()) return;

        setSubmitting(true);
        login(email.trim(), password).then(function(result) {
          if (result.ok) {
            toast.success(t('auth.success.login') + ' ' + t('auth.welcome_back', { name: result.user.prenom }));
            setTimeout(function() {
              window.location.href = '/admin/dashboard.html';
            }, 600);
          } else {
            var msg = (result.error && result.error.message) || t('auth.error.invalid_credentials');
            setGlobalError(msg);
            setPassword('');
          }
        }).catch(function() {
          setGlobalError(t('auth.error.network'));
        }).finally(function() {
          setSubmitting(false);
        });
      };

      if (loading) {
        return (
          <PublicLayout>
            <div data-react-mounted="1" style={{ textAlign: 'center', padding: 'var(--space-8)' }}>
              <div style={{ fontSize: 'var(--text-2xl)', marginBottom: 'var(--space-3)' }}>🎓</div>
              <p style={{ color: 'var(--color-text-muted)' }}>{t('common.loading')}</p>
            </div>
          </PublicLayout>
        );
      }

      return (
        <PublicLayout>
          <div data-react-mounted="1" style={{ textAlign: 'center', marginBottom: 'var(--space-6)' }}>
            <div style={{ fontSize: '3rem', marginBottom: 'var(--space-2)' }}>🎓</div>
            <h1 style={{
              margin: 0,
              fontSize: 'var(--text-2xl)',
              fontWeight: 'var(--font-bold)',
              fontFamily: 'var(--font-heading)',
              color: 'var(--color-text-strong)',
              letterSpacing: 'var(--tracking-tight)',
            }}>
              {t('app.name')}
            </h1>
            <p style={{
              margin: '4px 0 0 0',
              fontSize: 'var(--text-sm)',
              color: 'var(--color-text-muted)',
            }}>
              {t('app.subtitle')} <Badge variant="warning" size="sm" style={{ marginLeft: 4 }}>v0.2.0 — P2</Badge>
            </p>
          </div>

          <Card>
            <h2 style={{
              margin: '0 0 4px 0',
              fontSize: 'var(--text-lg)',
              fontWeight: 'var(--font-semibold)',
              fontFamily: 'var(--font-heading)',
            }}>
              {t('auth.login')}
            </h2>
            <p style={{
              margin: '0 0 var(--space-5) 0',
              fontSize: 'var(--text-sm)',
              color: 'var(--color-text-muted)',
            }}>
              Connectez-vous avec votre compte enseignant.
            </p>

            {globalError && (
              <div style={{
                padding: 'var(--space-3)',
                marginBottom: 'var(--space-4)',
                background: 'var(--color-danger-soft)',
                color: 'var(--c-danger-700)',
                border: '1px solid var(--color-danger)',
                borderRadius: 'var(--radius-md)',
                fontSize: 'var(--text-sm)',
              }} role="alert">
                {globalError}
              </div>
            )}

            <form onSubmit={handleSubmit}>
              {/* EMAIL — input natif */}
              <div style={{ marginBottom: 'var(--space-4)' }}>
                <label htmlFor="login-email" style={labelStyle}>
                  {t('auth.email')} <span style={{ color: 'var(--color-danger)' }}>*</span>
                </label>
                <input
                  id="login-email"
                  type="email"
                  value={email}
                  onChange={function(e) { setEmail(e.target.value); }}
                  placeholder="vous@ipssi.fr"
                  autoComplete="username"
                  autoFocus
                  required
                  disabled={submitting}
                  style={{
                    ...inputStyle,
                    borderColor: emailError ? 'var(--color-danger)' : 'var(--color-border)',
                  }}
                />
                {emailError && <div style={errorStyle}>{emailError}</div>}
              </div>

              {/* PASSWORD — input natif */}
              <div style={{ marginBottom: 'var(--space-2)' }}>
                <label htmlFor="login-password" style={labelStyle}>
                  {t('auth.password')} <span style={{ color: 'var(--color-danger)' }}>*</span>
                </label>
                <input
                  id="login-password"
                  type="password"
                  value={password}
                  onChange={function(e) { setPassword(e.target.value); }}
                  placeholder="••••••••"
                  autoComplete="current-password"
                  required
                  disabled={submitting}
                  style={{
                    ...inputStyle,
                    borderColor: pwdError ? 'var(--color-danger)' : 'var(--color-border)',
                  }}
                />
                {pwdError && <div style={errorStyle}>{pwdError}</div>}
              </div>

              <div style={{
                display: 'flex', justifyContent: 'flex-end',
                marginBottom: 'var(--space-5)',
              }}>
                <a
                  href="#"
                  onClick={function(e) {
                    e.preventDefault();
                    toast.info('Reset par CLI : php scripts/reset_password.php (self-service en P9)');
                  }}
                  style={{
                    fontSize: 'var(--text-sm)',
                    color: 'var(--color-link)',
                    textDecoration: 'none',
                  }}
                >
                  {t('auth.forgot_password')}
                </a>
              </div>

              <Button
                type="submit"
                variant="primary"
                fullWidth
                loading={submitting}
                disabled={submitting}
              >
                {submitting ? t('common.loading') : t('auth.sign_in_button')}
              </Button>
            </form>
          </Card>

          <div style={{
            marginTop: 'var(--space-6)',
            textAlign: 'center',
            fontSize: 'var(--text-xs)',
            color: 'var(--color-text-muted)',
          }}>
            Première utilisation ? Créez le 1er compte admin avec :{' '}
            <code style={{
              fontSize: 'var(--text-xs)',
              background: 'var(--color-bg-subtle)',
              padding: '2px 6px',
              borderRadius: 'var(--radius-sm)',
            }}>
              php scripts/init_comptes.php
            </code>
          </div>
        </PublicLayout>
      );
    }

    const { ErrorBoundary } = window.UI;

    function App() {
      return (
        <ToastProvider>
          <ErrorBoundary>
            <LoginPage />
          </ErrorBoundary>
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
