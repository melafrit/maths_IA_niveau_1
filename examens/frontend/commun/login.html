<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connexion à la plateforme d'examens IPSSI">
  <title>Connexion — Plateforme d'examens IPSSI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/main.css">
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="/assets/components-base.js" type="text/babel"></script>
  <script src="/assets/components-advanced.js" type="text/babel"></script>
  <script src="/assets/hooks.js" type="text/babel"></script>
  <script src="/assets/layouts.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Button, Input, Card, Badge, ToastProvider, useToast } = window.UI;
    const { useAuth, useTranslation } = window.UIHooks;
    const { PublicLayout } = window.UILayouts;

    function LoginPage() {
      const { t } = useTranslation();
      const { login, isAuthenticated, loading } = useAuth();
      const { toast } = useToast();

      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [emailError, setEmailError] = useState('');
      const [pwdError, setPwdError] = useState('');
      const [globalError, setGlobalError] = useState('');

      useEffect(() => {
        if (!loading && isAuthenticated) {
          window.location.href = '/admin/examens.html';
        }
      }, [loading, isAuthenticated]);

      const validate = () => {
        let valid = true;
        setEmailError(''); setPwdError(''); setGlobalError('');

        if (!email.trim()) {
          setEmailError(t('common.required'));
          valid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
          setEmailError('Format email invalide');
          valid = false;
        }

        if (!password) {
          setPwdError(t('common.required'));
          valid = false;
        } else if (password.length < 8) {
          setPwdError(t('auth.error.weak_password'));
          valid = false;
        }

        return valid;
      };

      const handleSubmit = async (e) => {
        if (e) e.preventDefault();
        if (!validate()) return;

        setSubmitting(true);
        try {
          const result = await login(email.trim(), password);
          if (result.ok) {
            toast.success(`${t('auth.success.login')} ${t('auth.welcome_back', { name: result.user.prenom })}`);
            setTimeout(() => {
              window.location.href = '/admin/examens.html';
            }, 600);
          } else {
            const msg = result.error?.message || t('auth.error.invalid_credentials');
            setGlobalError(msg);
            setPassword('');
          }
        } catch (err) {
          setGlobalError(t('auth.error.network'));
        } finally {
          setSubmitting(false);
        }
      };

      if (loading) {
        return (
          <PublicLayout>
            <div style={{ textAlign: 'center', padding: 'var(--space-8)' }}>
              <div style={{ fontSize: 'var(--text-2xl)', marginBottom: 'var(--space-3)' }}>🎓</div>
              <p style={{ color: 'var(--color-text-muted)' }}>{t('common.loading')}</p>
            </div>
          </PublicLayout>
        );
      }

      return (
        <PublicLayout>
          <div style={{ textAlign: 'center', marginBottom: 'var(--space-6)' }}>
            <div style={{ fontSize: '3rem', marginBottom: 'var(--space-2)' }}>🎓</div>
            <h1 style={{
              margin: 0,
              fontSize: 'var(--text-2xl)',
              fontWeight: 'var(--font-bold)',
              fontFamily: 'var(--font-heading)',
              color: 'var(--color-text-strong)',
              letterSpacing: 'var(--tracking-tight)',
            }}>
              {t('app.name')}
            </h1>
            <p style={{
              margin: '4px 0 0 0',
              fontSize: 'var(--text-sm)',
              color: 'var(--color-text-muted)',
            }}>
              {t('app.subtitle')} <Badge variant="warning" size="sm" style={{ marginLeft: 4 }}>v0.2.0 — P2</Badge>
            </p>
          </div>

          <Card>
            <h2 style={{
              margin: '0 0 4px 0',
              fontSize: 'var(--text-lg)',
              fontWeight: 'var(--font-semibold)',
              fontFamily: 'var(--font-heading)',
            }}>
              {t('auth.login')}
            </h2>
            <p style={{
              margin: '0 0 var(--space-5) 0',
              fontSize: 'var(--text-sm)',
              color: 'var(--color-text-muted)',
            }}>
              Connectez-vous avec votre compte enseignant.
            </p>

            {globalError && (
              <div style={{
                padding: 'var(--space-3)',
                marginBottom: 'var(--space-4)',
                background: 'var(--color-danger-soft)',
                color: 'var(--c-danger-700)',
                border: '1px solid var(--color-danger)',
                borderRadius: 'var(--radius-md)',
                fontSize: 'var(--text-sm)',
              }} role="alert">
                ⚠ {globalError}
              </div>
            )}

            <form onSubmit={handleSubmit}>
              <div style={{ marginBottom: 'var(--space-4)' }}>
                <Input
                  label={t('auth.email')}
                  type="email"
                  value={email}
                  onChange={setEmail}
                  placeholder="vous@ipssi.fr"
                  autoComplete="username"
                  autoFocus
                  required
                  error={emailError}
                  disabled={submitting}
                />
              </div>

              <div style={{ marginBottom: 'var(--space-2)' }}>
                <Input
                  label={t('auth.password')}
                  type="password"
                  value={password}
                  onChange={setPassword}
                  placeholder="••••••••"
                  autoComplete="current-password"
                  required
                  error={pwdError}
                  disabled={submitting}
                />
              </div>

              <div style={{
                display: 'flex', justifyContent: 'flex-end',
                marginBottom: 'var(--space-5)',
              }}>
                <a
                  href="#"
                  onClick={(e) => {
                    e.preventDefault();
                    toast.info('Reset par CLI : php scripts/reset_password.php (self-service en P9)');
                  }}
                  style={{
                    fontSize: 'var(--text-sm)',
                    color: 'var(--color-link)',
                    textDecoration: 'none',
                  }}
                >
                  {t('auth.forgot_password')}
                </a>
              </div>

              <Button
                type="submit"
                variant="primary"
                fullWidth
                loading={submitting}
                disabled={submitting}
                onClick={handleSubmit}
              >
                {submitting ? t('common.loading') : t('auth.sign_in_button')}
              </Button>
            </form>
          </Card>

          <div style={{
            marginTop: 'var(--space-6)',
            textAlign: 'center',
            fontSize: 'var(--text-xs)',
            color: 'var(--color-text-muted)',
          }}>
            Première utilisation ? Créez le 1er compte admin avec :{' '}
            <code style={{
              fontSize: 'var(--text-xs)',
              background: 'var(--color-bg-subtle)',
              padding: '2px 6px',
              borderRadius: 'var(--radius-sm)',
            }}>
              php scripts/init_comptes.php
            </code>
          </div>
        </PublicLayout>
      );
    }

    function App() {
      return (
        <ToastProvider>
          <LoginPage />
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
