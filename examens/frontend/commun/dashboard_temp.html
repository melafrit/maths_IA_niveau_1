<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace enseignant — Plateforme d'examens IPSSI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/main.css">
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="/assets/components-base.js?v=14" type="text/babel"></script>
  <script src="/assets/components-advanced.js?v=14" type="text/babel"></script>
  <script src="/assets/hooks.js?v=14" type="text/babel"></script>
  <script src="/assets/layouts.js?v=14" type="text/babel"></script>

  <script type="text/babel">
    const { useEffect } = React;
    const {
      Button, Card, Box, Badge,
      Stat, EmptyState,
      ToastProvider, useToast,
    } = window.UI;
    const { useAuth, useTranslation } = window.UIHooks;
    const { ProfLayout } = window.UILayouts;

    function DashboardPage() {
      const { t } = useTranslation();
      const { user, isAuthenticated, loading } = useAuth();
      const { toast } = useToast();

      // Redirect si pas authentifié
      useEffect(() => {
        if (!loading && !isAuthenticated) {
          window.location.href = '/login.html';
        }
      }, [loading, isAuthenticated]);

      if (loading || !user) {
        return (
          <div style={{
            minHeight: '100vh',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'var(--color-bg)',
          }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 'var(--text-2xl)', marginBottom: 'var(--space-3)' }}>🎓</div>
              <p style={{ color: 'var(--color-text-muted)' }}>{t('common.loading')}</p>
            </div>
          </div>
        );
      }

      return (
        <ProfLayout
          title={`${t('auth.welcome')}, ${user.prenom} 👋`}
          subtitle="Espace temporaire — Phase P2 (sera enrichi en P7 Analytics)"
          breadcrumbs={[
            { label: 'Accueil', href: '/dashboard_temp.html' },
            { label: t('nav.dashboard') },
          ]}
          actions={
            <Button
              variant="primary"
              icon={<span>➕</span>}
              onClick={() => toast.info('Wizard examen disponible en Phase P5')}
            >
              Nouvel examen
            </Button>
          }
        >

          {/* Bandeau d'état Phase */}
          <Box type="retenir" title="✅ Phase P2 — Design system livré">
            <p style={{ margin: '0 0 var(--space-2) 0' }}>
              La plateforme dispose désormais d'un <strong>design system complet</strong> :
              28 composants React, 8 hooks personnalisés, i18n français, 4 layouts, et thèmes clair/sombre.
            </p>
            <div style={{ display: 'flex', gap: 'var(--space-2)', flexWrap: 'wrap', marginTop: 'var(--space-2)' }}>
              <Badge variant="success">v0.2.0</Badge>
              <Badge variant="primary">28 composants</Badge>
              <Badge variant="primary">8 hooks</Badge>
              <Badge variant="primary">4 layouts</Badge>
              <Badge variant="primary">i18n FR</Badge>
            </div>
          </Box>

          {/* Stats factices (seront réelles en P7) */}
          <div style={{ marginTop: 'var(--space-6)', marginBottom: 'var(--space-3)' }}>
            <h2 style={{
              margin: 0,
              fontSize: 'var(--text-lg)',
              fontWeight: 'var(--font-semibold)',
              fontFamily: 'var(--font-heading)',
            }}>
              📊 Vue d'ensemble
            </h2>
            <p style={{ margin: '4px 0 0 0', fontSize: 'var(--text-sm)', color: 'var(--color-text-muted)' }}>
              Données provisoires — statistiques réelles en Phase P7
            </p>
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
            gap: 'var(--space-4)',
            marginBottom: 'var(--space-6)',
          }}>
            <Stat label="Examens créés" value="—" icon="📝" color="var(--color-primary)" />
            <Stat label="Passages étudiants" value="—" icon="👥" color="var(--c-success-500)" />
            <Stat label="Banque de questions" value="—" icon="📚" color="var(--c-box-intuition)" />
            <Stat label="Génération IA" value="—" icon="🤖" color="var(--c-info-500)" />
          </div>

          {/* Cartes "À venir" */}
          <div style={{ marginTop: 'var(--space-8)', marginBottom: 'var(--space-3)' }}>
            <h2 style={{
              margin: 0,
              fontSize: 'var(--text-lg)',
              fontWeight: 'var(--font-semibold)',
              fontFamily: 'var(--font-heading)',
            }}>
              🚀 Fonctionnalités à venir
            </h2>
            <p style={{ margin: '4px 0 0 0', fontSize: 'var(--text-sm)', color: 'var(--color-text-muted)' }}>
              Prochaines phases du développement
            </p>
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))',
            gap: 'var(--space-4)',
          }}>
            {[
              { icon: '📚', title: 'Banque de questions',      phase: 'P3', desc: 'CRUD, import/export, organisation par module et chapitre.' },
              { icon: '🤖', title: 'Génération IA',             phase: 'P4', desc: 'Questions générées par Claude ou OpenAI, clé API par prof.' },
              { icon: '📝', title: 'Créer un examen',           phase: 'P5', desc: 'Wizard en 4 étapes pour configurer un examen complet.' },
              { icon: '🛡️', title: 'Focus-lock anti-triche',   phase: 'P5', desc: 'Plein écran obligatoire, détection sortie de page, logs.' },
              { icon: '📧', title: 'Notifications email',       phase: 'P6', desc: 'Confirmations automatiques et corrections par email.' },
              { icon: '📊', title: 'Analytics approfondies',    phase: 'P7', desc: 'Dashboards temps réel + analyses transversales multi-promos.' },
            ].map((card) => (
              <Card key={card.phase + card.title} hoverable>
                <div style={{ fontSize: '2rem', marginBottom: 'var(--space-2)', opacity: 0.8 }}>
                  {card.icon}
                </div>
                <div style={{
                  display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
                  marginBottom: 'var(--space-2)',
                }}>
                  <h3 style={{
                    margin: 0,
                    fontSize: 'var(--text-base)',
                    fontWeight: 'var(--font-semibold)',
                  }}>
                    {card.title}
                  </h3>
                  <Badge variant="neutral" size="sm">{card.phase}</Badge>
                </div>
                <p style={{
                  margin: 0,
                  fontSize: 'var(--text-sm)',
                  color: 'var(--color-text-muted)',
                  lineHeight: 'var(--leading-relaxed)',
                }}>
                  {card.desc}
                </p>
              </Card>
            ))}
          </div>

          {/* Liens démo design system */}
          <Card title="🎨 Démos design system" style={{ marginTop: 'var(--space-8)' }}>
            <p style={{ margin: '0 0 var(--space-3) 0', fontSize: 'var(--text-sm)', color: 'var(--color-text-muted)' }}>
              Explorez les composants et tokens livrés en Phase P2 :
            </p>
            <div style={{ display: 'flex', gap: 'var(--space-2)', flexWrap: 'wrap' }}>
              <Button variant="outline" size="sm" onClick={() => window.location.href='/demo_tokens.html'}>
                🎨 Tokens (couleurs, typo)
              </Button>
              <Button variant="outline" size="sm" onClick={() => window.location.href='/demo_components.html'}>
                🧩 17 composants base
              </Button>
              <Button variant="outline" size="sm" onClick={() => window.location.href='/demo_advanced.html'}>
                ⚡ 11 composants avancés
              </Button>
            </div>
          </Card>

        </ProfLayout>
      );
    }

    function App() {
      return (
        <ToastProvider>
          <DashboardPage />
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
