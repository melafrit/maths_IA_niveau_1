const ThemeContext = createContext();
function ThemeProvider({ children }) {
  const [mode, setMode] = useState('light');
  const theme = THEMES[mode];
  const toggle = () => setMode(m => m === 'light' ? 'dark' : 'light');
  return <ThemeContext.Provider value={{ mode, theme, toggle }}>{children}</ThemeContext.Provider>;
}
function useTheme() { return useContext(ThemeContext); }

/* ============================================================================

function M({ t, d }) {
  if (!window.katex) return <code style={{ fontSize:'0.9em' }}>{t}</code>;
  try {
    const html = window.katex.renderToString(t, { throwOnError: false, displayMode: !!d });
    if (d) return <div style={{ margin:'20px 0', textAlign:'center', overflowX:'auto' }} dangerouslySetInnerHTML={{ __html: html }} />;
    return <span dangerouslySetInnerHTML={{ __html: html }} />;
  } catch { return <code>{t}</code>; }
}

function PythonCell({ code: init, title='Code Python' }) {
  const { theme } = useTheme();
  const [code, setCode] = useState(init);
  const [output, setOutput] = useState('');
  const [imgSrc, setImgSrc] = useState(null);
  const [running, setRunning] = useState(false);
  const [status, setStatus] = useState('idle');

  const run = async () => {
    setRunning(true); setOutput(''); setImgSrc(null);
    try {
      if (!window._pyodideReady) {
        setStatus('loading');
        if (!window._pyodideLoading) {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
          document.head.appendChild(s);
          window._pyodideLoading = new Promise(res => { s.onload = res; });
        }
        await window._pyodideLoading;
        window._pyodideReady = await window.loadPyodide({ indexURL:'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/' });
        await window._pyodideReady.loadPackage(['numpy','matplotlib']);
        setStatus('ready');
      }
      const py = window._pyodideReady;
      py.runPython(`import sys,io,base64\nimport matplotlib;matplotlib.use('AGG')\nimport matplotlib.pyplot as plt\n_cap=io.StringIO();sys.stdout=_cap`);
      py.runPython(code);
      setOutput(py.runPython('_cap.getvalue()'));
      const hasPlot = py.runPython(`_buf=io.BytesIO();_fig=plt.gcf();_h=len(_fig.get_axes())>0\nif _h:_fig.savefig(_buf,format='png',dpi=120,bbox_inches='tight',facecolor='white');_buf.seek(0)\nplt.close('all');_h`);
      if (hasPlot) setImgSrc(`data:image/png;base64,${py.runPython("base64.b64encode(_buf.getvalue()).decode()")}`);
    } catch(e) { setOutput(`Erreur : ${e.message}`); }
    setRunning(false);
  };

  return (
    <div style={{ border:`1px solid ${theme.codeBorder}`, borderRadius:'8px', overflow:'hidden', margin:'20px 0' }}>
      <div style={{ background:theme.codeBg, padding:'8px 16px', display:'flex', justifyContent:'space-between', alignItems:'center',
        borderBottom:`1px solid ${theme.codeBorder}`, fontFamily:"'DM Sans',sans-serif", fontSize:'0.85rem', color:theme.codeTitle, fontWeight:600 }}>
        <span>🐍 {title}</span>
        <button onClick={run} disabled={running} style={{ background:'#22c55e', color:'white', border:'none', padding:'4px 14px', borderRadius:'4px', cursor:'pointer', fontWeight:600, fontSize:'0.85rem', opacity:running?0.6:1 }}>
          {running?(status==='loading'?'⏳ Chargement Pyodide...':'⏳ Exécution...'):'▶ Exécuter'}
        </button>
      </div>
      <textarea value={code} onChange={e=>setCode(e.target.value)} spellCheck={false}
        style={{ width:'100%', minHeight:'100px', fontFamily:"'JetBrains Mono',monospace", fontSize:'0.82rem', lineHeight:1.6,
          background:theme.bgCode, color:theme.text, border:'none', padding:'14px', resize:'vertical', outline:'none', boxSizing:'border-box' }} />
      {(output||imgSrc)&&(
        <div style={{ borderTop:`1px solid ${theme.codeBorder}`, padding:'12px 16px', background:theme.bgAlt,
          fontFamily:"'JetBrains Mono',monospace", fontSize:'0.8rem', color:theme.textSecondary, whiteSpace:'pre-wrap' }}>
          {output&&<pre style={{ margin:0 }}>{output}</pre>}
          {imgSrc&&<img src={imgSrc} alt="Graphique" style={{ maxWidth:'100%', marginTop:'8px', borderRadius:'4px' }} />}
        </div>
      )}
    </div>
  );
}

      <Sec id="ia-accroche" title="1.1 Comment Netflix vous recommande des films" level={2}>
        <P>Quand vous ouvrez Netflix, l'application vous propose des films « faits pour vous ». Comment fait-elle ?
        Elle ne vous connaît pas personnellement — mais elle possède des <B>données</B> sur vous : les films
        que vous avez regardés, ceux que vous avez aimés, l'heure à laquelle vous les regardez…</P>
        <P>À partir de ces données, Netflix utilise une <B>fonction mathématique</B> qui prend vos caractéristiques
        en entrée et produit une note de recommandation en sortie. C'est exactement ce que fait
        un modèle d'intelligence artificielle : il transforme des nombres en entrée en un résultat en sortie.</P>
        <P>Aujourd'hui, nous allons comprendre comment structurer ces données et comment fonctionne cette transformation
        — en utilisant un exemple concret : <B>prédire le salaire d'un développeur</B>.</P>
      </Sec>

      <Sec id="ia-intuition" title="1.2 Intuition : la machine à café" level={2}>
        <Box type="intuition" title="Analogie : la machine à café">
          <P style={{marginBottom:8}}>Pensez à une machine à café automatique :</P>
          <P style={{marginBottom:8}}>
            • Vous insérez des <B>entrées</B> : le type de boisson, la taille, le sucre{'\n'}
            • La machine effectue un <B>calcul interne</B> (dosage, mélange, chauffe){'\n'}
            • Elle produit une <B>sortie</B> : votre café
          </P>
          <P style={{marginBottom:0}}>Un modèle d'IA fonctionne pareil : il prend des nombres en entrée (les <em>features</em>),
          effectue un calcul, et produit un nombre en sortie (la <em>prédiction</em>). La seule différence :
          la « recette » est <B>apprise à partir de données</B>.</P>
        </Box>
      </Sec>

      <Sec id="ia-formalisation" title="1.3 Formalisation : ŷ = f(x)" level={2}>
        <P>Traduisons cette intuition en notation mathématique. Un modèle d'IA est une <B>fonction</B> :</P>
        <M d t={"\\hat{y} = f(\\mathbf{x})"} />
        <P>
          • <M t={"\\mathbf{x}"} /> est le <B>vecteur d'entrée</B> — les caractéristiques (features) d'une observation{'\n'}
          • <M t={"f"} /> est la <B>fonction de prédiction</B> — le modèle{'\n'}
          • <M t={"\\hat{y}"} /> (lire « y chapeau ») est la <B>prédiction</B> — la valeur estimée
        </P>
        <Box type="definition" title="Fonction de prédiction">
          <P style={{marginBottom:0}}>Une <B>fonction de prédiction</B> <M t={"f : \\mathbb{R}^p \\to \\mathbb{R}"} /> associe à un
          vecteur d'entrée <M t={"\\mathbf{x}"} /> composé de <M t={"p"} /> caractéristiques
          une valeur de sortie <M t={"\\hat{y}"} /> appelée <B>prédiction</B>.</P>
        </Box>
        <P>Dans le cas de la <B>régression linéaire</B>, cette fonction prend la forme :</P>
        <M d t={"\\hat{y} = \\mathbf{w}^T \\mathbf{x} + b"} />
        <P>où <M t={"\\mathbf{w}"} /> est un vecteur de <B>poids</B> (weights) et <M t={"b"} /> est un <B>biais</B> (bias).</P>
      </Sec>

      <Sec id="ia-parametres" title="1.4 Paramètres et apprentissage" level={2}>
        <P>En pratique, on écrit le modèle de façon plus précise :</P>
        <M d t={"\\hat{y} = f_{\\boldsymbol{\\theta}}(\\mathbf{x})"} />
        <P>L'indice <M t={"\\boldsymbol{\\theta}"} /> (thêta) représente les <B>paramètres</B> du modèle —
        les « boutons de réglage » qui déterminent comment la fonction transforme l'entrée en sortie.</P>
        <Box type="retenir" title="L'apprentissage en une phrase">
          <P style={{marginBottom:0}}><B>Apprendre</B>, pour un modèle d'IA, c'est <B>ajuster ses paramètres</B> <M t={"\\boldsymbol{\\theta}"} /> pour
          que ses prédictions <M t={"\\hat{y}"} /> soient les plus proches possible des vraies valeurs <M t={"y"} />.
          C'est ce que nous verrons au Jour 2 avec la descente de gradient.</P>
        </Box>
        <Box type="intuition">
          <P style={{marginBottom:0}}>Reprenons la machine à café. Imaginez qu'elle est mal réglée :
          le café est trop amer. Vous tournez un <B>bouton</B> (paramètre). Vous goûtez, c'est mieux
          mais encore un peu fort. Vous réajustez. Après plusieurs essais, le café est parfait.
          L'IA fait exactement cela — mais automatiquement, et avec des millions de « boutons ».</P>
        </Box>
      </Sec>
    </Sec>

    <Sec id="vecteurs" title="3. Vecteurs : représenter une observation" level={1}>
      <Sec id="vecteurs-intuition" title="3.1 Un développeur = un point dans l'espace" level={2}>
        <P>Chaque développeur est décrit par 5 nombres. On peut voir ces 5 nombres comme
        les <B>coordonnées d'un point</B> dans un espace à 5 dimensions.</P>
        <Box type="intuition" title="Analogie : les coordonnées GPS">
          <P style={{marginBottom:0}}>Une position GPS est un « vecteur » à 2 dimensions : (latitude, longitude).
          Avec 2 nombres, on localise un point sur Terre.
          Un développeur est un « point » dans un espace à 5 dimensions : (expérience, langages, études, entreprise, remote).
          On ne peut pas le dessiner, mais mathématiquement c'est la même idée !</P>
        </Box>
      </Sec>

      <Sec id="vecteurs-formalisation" title="3.2 Formalisation" level={2}>
        <Box type="definition" title="Vecteur de caractéristiques (feature vector)">
          <P style={{marginBottom:8}}>Un <B>vecteur de caractéristiques</B> est un vecteur <M t={"\\mathbf{x} \\in \\mathbb{R}^p"} /> dont
          chaque composante correspond à une caractéristique mesurable :</P>
          <M d t={"\\mathbf{x} = \\begin{pmatrix} x_1 \\\\ x_2 \\\\ \\vdots \\\\ x_p \\end{pmatrix}"} />
          <P style={{marginBottom:0}}>On note <M t={"p"} /> le nombre de features. Dans notre dataset, <M t={"p = 5"} />.</P>
        </Box>
        <P>Par convention, un vecteur est en <B>colonne</B>. Sa <B>transposée</B> <M t={"\\mathbf{x}^T"} /> est en ligne :</P>
        <M d t={"\\mathbf{x}^T = \\begin{pmatrix} x_1 & x_2 & \\cdots & x_p \\end{pmatrix}"} />
        <Box type="attention" title="La dimension compte !">
          <P style={{marginBottom:0}}>Un vecteur dans <M t={"\\mathbb{R}^5"} /> a exactement 5 composantes.
          On ne peut pas additionner <M t={"\\mathbb{R}^5"} /> et <M t={"\\mathbb{R}^3"} />.
          En NumPy, c'est le <Cd>shape</Cd> qui indique la dimension.</P>
        </Box>
      </Sec>

      <Sec id="vecteurs-exemple" title="3.3 Exemple numérique" level={2}>
        <Box type="exemple" title="Développeur #2 du dataset">
          <M d t={"\\mathbf{x}_2 = \\begin{pmatrix} 1 \\\\ 3 \\\\ 4 \\\\ 800 \\\\ 40 \\end{pmatrix} \\quad \\text{avec } y_2 = 35{,}0 \\text{ k€}"} />
          <P style={{marginBottom:0}}>Composantes : <M t={"x_1=1"} /> (1 an), <M t={"x_2=3"} /> (3 langages),
          <M t={"x_3=4"} /> (Bac+5), <M t={"x_4=800"} /> (800 employés), <M t={"x_5=40"} /> (40% remote).</P>
        </Box>
      </Sec>

      <Sec id="vecteurs-python" title="3.4 Vecteurs en NumPy" level={2}>
        <PythonCell title="Créer et manipuler des vecteurs" code={`import numpy as np

      </Sec>
    </Sec>

    {/* ── SECTION 4 ── */}
    <Sec id="matrices" title="4. Matrices : représenter un dataset" level={1}>
      <Sec id="matrices-intuition" title="4.1 Du tableau à la matrice" level={2}>
        <P>Notre dataset est un tableau de 30 lignes × 5 colonnes.
        En mathématiques, un tel tableau rectangulaire s'appelle une <B>matrice</B>.</P>
        <Box type="intuition">
          <P style={{marginBottom:0}}>Si un vecteur est une « liste de nombres » (1D),
          une matrice est un « tableau de nombres » (2D).
          C'est comme passer d'une <B>fiche individuelle</B> d'un développeur
          au <B>fichier Excel complet</B> de toute l'équipe.</P>
        </Box>
      </Sec>

      <Sec id="matrices-formalisation" title="4.2 Formalisation" level={2}>
        <Box type="definition" title="Matrice de données">
          <P style={{marginBottom:8}}><M t={"\\mathbf{X} \\in \\mathbb{R}^{n \\times p}"} /> est un tableau de <M t={"n"} /> lignes × <M t={"p"} /> colonnes :</P>
          <M d t={"\\mathbf{X} = \\begin{pmatrix} x_{11} & x_{12} & \\cdots & x_{1p} \\\\ x_{21} & x_{22} & \\cdots & x_{2p} \\\\ \\vdots & \\vdots & \\ddots & \\vdots \\\\ x_{n1} & x_{n2} & \\cdots & x_{np} \\end{pmatrix}"} />
          <P style={{marginBottom:0}}><M t={"x_{ij}"} /> = feature <M t={"j"} /> de l'observation <M t={"i"} />.
          Ici <M t={"n=30"} />, <M t={"p=5"} />, donc <M t={"\\mathbf{X} \\in \\mathbb{R}^{30 \\times 5}"} />.</P>
        </Box>
      </Sec>

      <Sec id="matrices-python" title="4.3 Matrices en NumPy" level={2}>
        <PythonCell title="Matrice du dataset en NumPy" code={`import numpy as np

# 6 premiers développeurs, 5 features
X = np.array([

    [ 2,4,4,3000, 20], [ 0,1,1,  30, 50],

      </Sec>
    </Sec>

    {/* ── SECTION 5 ── */}
    <Sec id="produit-scalaire" title="5. Produit scalaire : combiner features et poids" level={1}>
      <Sec id="ps-intuition" title="5.1 Pondérer les features" level={2}>
        <P>Certaines features comptent plus que d'autres pour prédire le salaire.
        L'expérience a plus d'impact que le % de télétravail.</P>
        <Box type="intuition" title="Analogie : la moyenne pondérée">
          <P style={{marginBottom:0}}>Pensez au calcul de votre moyenne au bac : français (coef 5), maths (coef 7),
          sport (coef 2)… Chaque matière est multipliée par un <B>poids</B> différent.
          Le produit scalaire fait cela : il multiplie chaque feature par un poids, puis additionne le tout.</P>
        </Box>
      </Sec>

      <Sec id="ps-formalisation" title="5.2 Formalisation" level={2}>
        <Box type="definition" title="Produit scalaire">
          <M d t={"\\langle \\mathbf{x}, \\mathbf{w} \\rangle = \\mathbf{x}^T \\mathbf{w} = \\sum_{i=1}^{p} x_i \\cdot w_i"} />
          <P style={{marginBottom:0}}>Le résultat est un <B>scalaire</B> (un seul nombre).</P>
        </Box>
        <Box type="attention" title="Dimensions compatibles">
          <P style={{marginBottom:0}}>Le produit scalaire exige que les deux vecteurs aient la <B>même dimension</B>.
          <M t={"\\mathbf{x} \\in \\mathbb{R}^5"} /> et <M t={"\\mathbf{w} \\in \\mathbb{R}^3"} /> → impossible.</P>
        </Box>
      </Sec>

      <Sec id="ps-exemple" title="5.3 Exemple numérique" level={2}>
        <Box type="exemple" title="Prédiction manuelle du salaire">
          <M d t={"\\mathbf{x}_2 = \\begin{pmatrix} 1 \\\\ 3 \\\\ 4 \\\\ 800 \\\\ 40 \\end{pmatrix}, \\quad \\mathbf{w} = \\begin{pmatrix} 2.0 \\\\ 1.5 \\\\ 3.0 \\\\ 0.005 \\\\ 0.02 \\end{pmatrix}"} />
          <M d t={"\\langle \\mathbf{x}_2, \\mathbf{w} \\rangle = 2.0 + 4.5 + 12.0 + 4.0 + 0.8 = 23.3"} />
          <P style={{marginBottom:0}}>Avec un biais <M t={"b=15"} /> : <M t={"\\hat{y} = 23.3 + 15 = 38.3"} /> k€. Le vrai salaire est 35.0 k€ — pas mal !</P>
        </Box>
      </Sec>

      <Sec id="ps-python" title="5.4 Calcul en Python" level={2}>
        <PythonCell title="Produit scalaire : 3 méthodes" code={`import numpy as np

x2 = np.array([1, 3, 4, 800, 40])
w  = np.array([2.0, 1.5, 3.0, 0.005, 0.02])

# Méthode 1 : boucle manuelle
res = 0
for i in range(len(x2)):
    res += x2[i] * w[i]
print(f"Boucle : {res}")

# Méthode 2 : np.dot
print(f"np.dot : {np.dot(x2, w)}")

# Méthode 3 : opérateur @
print(f"x @ w  : {x2 @ w}")

# Prédiction avec biais
b = 15.0
print(f"\\nPrédiction : {x2 @ w + b:.1f} k€  (vrai : 35.0 k€)")`} />
      </Sec>
    </Sec>

    {/* ── SECTION 6 ── */}
    <Sec id="mat-vec" title="6. Multiplication matrice-vecteur" level={1}>
      <Sec id="mv-intuition" title="6.1 Prédire tous les salaires d'un coup" level={2}>
        <P>Le produit scalaire prédit <B>un seul</B> salaire. La <B>multiplication matrice-vecteur</B> calcule
        le produit scalaire de <B>chaque ligne</B> avec le vecteur de poids — toutes les prédictions d'un coup.</P>
        <Box type="intuition">
          <P style={{marginBottom:0}}>C'est comme appuyer sur un bouton qui calcule 30 salaires simultanément,
          au lieu de faire 30 calculs séparés.</P>
        </Box>
      </Sec>

      <Sec id="mv-formalisation" title="6.2 Formalisation" level={2}>
        <M d t={"\\hat{\\mathbf{y}} = \\mathbf{X} \\mathbf{w} \\in \\mathbb{R}^n \\quad \\text{avec} \\quad \\hat{y}_i = \\sum_{j=1}^{p} x_{ij} w_j"} />
        <Box type="exemple" title="Exemple 3×2">
          <M d t={"\\begin{pmatrix} 1 & 2 \\\\ 3 & 4 \\\\ 5 & 6 \\end{pmatrix} \\begin{pmatrix} 0.5 \\\\ 0.3 \\end{pmatrix} = \\begin{pmatrix} 1.1 \\\\ 2.7 \\\\ 4.3 \\end{pmatrix}"} />
        </Box>
        <Box type="retenir" title="Lien produit scalaire ↔ multiplication matricielle">
          <P style={{marginBottom:0}}><M t={"\\mathbf{Xw}"} /> = <B>n produits scalaires en parallèle</B>. Chaque ligne de <M t={"\\mathbf{X}"} /> fait
          un produit scalaire avec <M t={"\\mathbf{w}"} />. C'est l'opération fondamentale de tout modèle linéaire.</P>
        </Box>
      </Sec>

      <Sec id="mv-python" title="6.3 Calcul en Python" level={2}>
        <PythonCell title="Multiplication matrice-vecteur" code={`import numpy as np

# 6 premiers développeurs
X = np.array([
    [ 0,2,3, 150, 80], [ 1,1,2,  50,100],
    [ 1,3,4, 800, 40], [ 2,2,3, 200, 60],
    [ 2,4,4,3000, 20], [ 0,1,1,  30, 50],
])
w = np.array([2.0, 1.5, 3.0, 0.005, 0.02])
b = 15.0

y_pred = X @ w + b
vrais = np.array([28.0, 26.5, 35.0, 32.0, 38.0, 25.0])

print("Prédictions :", np.round(y_pred, 1))
print("Vrais       :", vrais)
print("Erreurs     :", np.round(y_pred - vrais, 1))`} />
      </Sec>
    </Sec>

    {/* ── SECTION 7 ── */}
    <Sec id="regression" title="7. Régression linéaire : notre premier modèle" level={1}>
      <Sec id="reg-accroche" title="7.1 Tracer la meilleure droite" level={2}>
        <P>Peut-on tracer une <B>droite</B> qui prédit le salaire à partir de l'expérience ?
        Intuitivement oui : plus d'expérience → salaire plus élevé. Mais <em>quelle</em> droite parmi
        les infinités de droites possibles ?</P>
      </Sec>

      <Sec id="reg-intuition" title="7.2 La droite des moindres carrés" level={2}>
        <Box type="intuition" title="Ajuster une règle sur un nuage de points">
          <P style={{marginBottom:0}}>Imaginez une règle transparente posée sur un graphique avec 30 points.
          Vous essayez de la placer « au milieu ». Les distances entre les points et la règle sont
          des <B>erreurs</B>. La droite des moindres carrés minimise la somme des carrés de ces erreurs.</P>
        </Box>
      </Sec>

      <Sec id="reg-formalisation" title="7.3 Formalisation" level={2}>
        <P>Cas simple (une feature : expérience) :</P>
        <M d t={"\\hat{y} = w_1 \\cdot \\texttt{experience} + w_0"} />
        <P><M t={"w_1"} /> = <B>pente</B> (impact de chaque année), <M t={"w_0"} /> = <B>ordonnée à l'origine</B> (salaire de base).</P>
        <P>Cas général avec <M t={"p"} /> features :</P>
        <M d t={"\\hat{\\mathbf{y}} = \\mathbf{X}\\mathbf{w} + b"} />
        <Box type="attention" title="Corrélation ≠ Causalité">
          <P style={{marginBottom:0}}>L'expérience est <B>corrélée</B> au salaire, mais ne le <em>cause</em> pas directement.
          D'autres facteurs cachés pourraient expliquer les deux.</P>
        </Box>
      </Sec>

      <Sec id="reg-mse" title="7.4 Erreur et MSE" level={2}>
        <Box type="definition" title="Erreur quadratique moyenne (MSE)">
          <M d t={"\\text{MSE} = J(\\mathbf{w}) = \\frac{1}{n} \\sum_{i=1}^{n} (y_i - \\hat{y}_i)^2"} />
          <P style={{marginBottom:0}}>On élève au carré pour pénaliser les grosses erreurs et éviter
          que positives et négatives ne s'annulent.</P>
        </Box>
        <Box type="retenir">
          <P style={{marginBottom:0}}>Plus le MSE est <B>petit</B>, meilleur est le modèle.
          Sur notre dataset : MSE = <B>20.46 (k€)²</B>, soit une erreur typique ≈ <M t={"\\sqrt{20.46} \\approx 4.5"} /> k€.</P>
        </Box>
      </Sec>

      <Sec id="reg-python" title="7.5 Implémentation Python" level={2}>
        <PythonCell title="Régression linéaire from scratch + graphique" code={`import numpy as np
import matplotlib.pyplot as plt

# Dataset : [experience, salaire]
data = np.array([
    [ 0,28.0],[ 1,26.5],[ 1,35.0],[ 2,32.0],[ 2,38.0],[ 0,25.0],
    [ 3,34.5],[ 1,42.0],[ 4,38.5],[ 5,44.0],[ 5,41.0],[ 6,48.0],
    [ 6,43.5],[ 7,50.0],[ 7,39.0],[ 4,47.0],[ 8,51.0],[ 5,40.0],
    [ 9,52.0],[10,55.0],[10,48.5],[11,58.0],[12,60.0],[ 9,42.0],
    [13,62.0],[11,54.0],[15,65.0],[17,68.0],[20,72.0],[18,58.0],
])
x = data[:, 0]; y = data[:, 1]

# Formule analytique des moindres carrés
xm, ym = x.mean(), y.mean()
w = np.sum((x - xm) * (y - ym)) / np.sum((x - xm) ** 2)
b = ym - w * xm

y_pred = w * x + b
mse = np.mean((y - y_pred) ** 2)

print(f"y = {w:.2f} * experience + {b:.2f}")
print(f"Chaque année ≈ +{w:.2f} k€")
print(f"MSE = {mse:.2f} (k€)²")

fig, ax = plt.subplots(figsize=(8, 5))
ax.scatter(x, y, c='#3b82f6', s=50, alpha=0.8, zorder=3)
xl = np.linspace(0, 21, 100)
ax.plot(xl, w*xl+b, 'r--', lw=2, label=f'y={w:.2f}x+{b:.2f}')
ax.axhline(45, color='gray', ls=':', alpha=0.5, label='Seuil 45 k€')
ax.set_xlabel("Années d'expérience"); ax.set_ylabel("Salaire (k€)")
ax.set_title("Régression linéaire : Expérience → Salaire")
ax.legend(); ax.grid(True, alpha=0.3); plt.tight_layout(); plt.show()`} />

function Jour1Page() {

  useEffect(() => {
    const ids = [];

    const obs = new IntersectionObserver(entries => {
      const vis = entries.filter(e => e.isIntersecting).sort((a,b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (vis.length) setActiveId(vis[0].target.id);
    }, { rootMargin: '-10% 0px -80% 0px' });
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  return <ThemeProvider><Shell activeId={activeId} /></ThemeProvider>;
}
