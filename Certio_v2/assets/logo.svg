<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background rectangle -->
  <rect width="400" height="120" fill="#1a365d" rx="8"/>
  
  <!-- Shield icon -->
  <g transform="translate(30, 30)">
    <path d="M 30 0 L 60 12 L 60 35 Q 60 48 30 60 Q 0 48 0 35 L 0 12 Z" 
          fill="#48bb78" 
          stroke="#ffffff" 
          stroke-width="2"/>
    <!-- Checkmark -->
    <path d="M 15 30 L 25 40 L 45 20" 
          stroke="#ffffff" 
          stroke-width="3.5" 
          fill="none" 
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
  
  <!-- Text "Certio" -->
  <text x="120" y="55" 
        font-family="Arial, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#ffffff">Certio</text>
  
  <!-- Tagline -->
  <text x="120" y="85" 
        font-family="Arial, sans-serif" 
        font-size="13" 
        fill="#cbd5e0">Certainty-Based Assessment Platform</text>
  
  <!-- Decorative circles for CBM concept -->
  <g opacity="0.3">
    <circle cx="355" cy="30" r="4" fill="#48bb78"/>
    <circle cx="370" cy="45" r="3" fill="#48bb78"/>
    <circle cx="380" cy="60" r="2" fill="#48bb78"/>
  </g>
</svg>
