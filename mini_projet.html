const ThemeContext = createContext();
function ThemeProvider({ children }) {
  const [mode, setMode] = useState("light");
  return (
    <ThemeContext.Provider value={{ mode, theme: THEMES[mode], toggle: () => setMode((m) => (m === "light" ? "dark" : "light")) }}>
      {children}
    </ThemeContext.Provider>
  );
}
function useTheme() { return useContext(ThemeContext); }

// ─── KATEX ────────────────────────────────────────────────────────────
function useKatex() {
  const [ready, setReady] = useState(false);
  useEffect(() => {
    if (window.katex) { setReady(true); return; }
    const l = document.createElement("link"); l.rel = "stylesheet"; l.href = "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"; document.head.appendChild(l);
    const s = document.createElement("script"); s.src = "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"; s.onload = () => setReady(true); document.head.appendChild(s);
  }, []);
  return ready;
}
function M({ t, d }) {
  const k = useKatex();
  if (!k) return <code style={{ fontSize: "0.9em" }}>{t}</code>;
  try {
    const html = window.katex.renderToString(t, { throwOnError: false, displayMode: !!d });
    if (d) return <div style={{ margin: "20px 0", textAlign: "center", overflowX: "auto" }} dangerouslySetInnerHTML={{ __html: html }} />;
    return <span dangerouslySetInnerHTML={{ __html: html }} />;
  } catch (e) { return <code>{t}</code>; }
}

function PythonCell({ code: init, title = "Code Python" }) {
  const { theme } = useTheme();
  const [code, setCode] = useState(init);
  const [output, setOutput] = useState("");
  const [imgSrc, setImgSrc] = useState(null);
  const [running, setRunning] = useState(false);
  const [status, setStatus] = useState("idle");

  const run = async () => {
    setRunning(true); setOutput(""); setImgSrc(null);
    try {
      if (!window._pyodideReady) {
        setStatus("loading");
        if (!window._pyodideLoading) {
          const s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js";
          document.head.appendChild(s);
          window._pyodideLoading = new Promise((res) => { s.onload = res; });
        }
        await window._pyodideLoading;
        window._pyodideReady = await window.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/" });
        await window._pyodideReady.loadPackage(["numpy", "matplotlib"]);
        setStatus("ready");
      }
      const py = window._pyodideReady;
      py.runPython("import sys,io,base64\nimport matplotlib;matplotlib.use('AGG')\nimport matplotlib.pyplot as plt\n_cap=io.StringIO();sys.stdout=_cap");
      py.runPython(code);
      setOutput(py.runPython("_cap.getvalue()"));
      const hp = py.runPython("_buf=io.BytesIO();_fig=plt.gcf();_h=len(_fig.get_axes())>0\nif _h:_fig.savefig(_buf,format='png',dpi=120,bbox_inches='tight',facecolor='white');_buf.seek(0)\nplt.close('all');_h");
      if (hp) setImgSrc("data:image/png;base64," + py.runPython("base64.b64encode(_buf.getvalue()).decode()"));
    } catch (e) { setOutput("Erreur : " + e.message); }
    setRunning(false);
  };

  return (
    <div style={{ border: `1px solid ${theme.codeBorder}`, borderRadius: "8px", overflow: "hidden", margin: "20px 0" }}>
      <div style={{ background: theme.codeBg, padding: "8px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${theme.codeBorder}`, fontFamily: "'DM Sans',sans-serif", fontSize: "0.85rem", color: theme.codeTitle, fontWeight: 600 }}>
        <span>🐍 {title}</span>
        <button onClick={run} disabled={running} style={{ background: "#22c55e", color: "white", border: "none", padding: "4px 14px", borderRadius: "4px", cursor: "pointer", fontWeight: 600, fontSize: "0.85rem", opacity: running ? 0.6 : 1 }}>
          {running ? (status === "loading" ? "⏳ Chargement..." : "⏳ Exécution...") : "▶ Exécuter"}
        </button>
      </div>
      <textarea value={code} onChange={(e) => setCode(e.target.value)} spellCheck={false} style={{ width: "100%", minHeight: "100px", fontFamily: "'JetBrains Mono',monospace", fontSize: "0.82rem", lineHeight: 1.6, background: theme.bgCode, color: theme.text, border: "none", padding: "14px", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
      {(output || imgSrc) && (
        <div style={{ borderTop: `1px solid ${theme.codeBorder}`, padding: "12px 16px", background: theme.bgAlt, fontFamily: "'JetBrains Mono',monospace", fontSize: "0.8rem", color: theme.textSecondary, whiteSpace: "pre-wrap" }}>
          {output && <pre style={{ margin: 0 }}>{output}</pre>}
          {imgSrc && <img src={imgSrc} alt="Graphique" style={{ maxWidth: "100%", marginTop: "8px", borderRadius: "4px" }} />}
        </div>
      )}
    </div>
  );
}

            <a href="index.html" style={{ display:'inline-flex', alignItems:'center', gap:'4px', fontFamily:"'DM Sans',sans-serif", fontSize:'0.75rem', color:theme.textMuted, textDecoration:'none', marginBottom:'8px' }}>← Accueil</a>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: "1rem", color: theme.accent }}>🔬 Mini-projet</div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "0.78rem", color: theme.textMuted, marginTop: "2px" }}>Du vecteur au réseau</div>
          </div>
          <nav style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
            <a href="notebook/Mini_Projet.ipynb" download="Mini_Projet.ipynb" style={{ display: "flex", alignItems: "center", gap: "6px", padding: "8px 14px 8px 18px", margin: "0 8px 8px", borderRadius: "6px", background: theme.accent + "15", border: `1px solid ${theme.accent}33`, fontFamily: "'DM Sans',sans-serif", fontSize: "0.78rem", fontWeight: 600, color: theme.accent, textDecoration: "none", cursor: "pointer" }}>
              <span style={{ fontSize: "0.9rem" }}>🐍</span> Telecharger le notebook
            </a>
            {SECTIONS.map((sec) => {
              const isOpen = !collapsed[sec.id];

              return (
                <div key={sec.id}>

                    {sec.children && <span style={{ fontSize: "0.55rem", transition: "transform 0.2s", transform: isOpen ? "rotate(90deg)" : "rotate(0)", display: "inline-block" }}>▶</span>}
                    <span style={{ flex: 1 }}>{sec.title}</span>

              );

          <div style={{ padding: "14px", borderTop: `1px solid ${theme.border}`, fontSize: "0.68rem", color: theme.textMuted, fontFamily: "'DM Sans',sans-serif", textAlign: "center", lineHeight: 1.6 }}>
            © 2025 Mohamed EL AFRIT<br /><a href="https://www.mohamedelafrit.com" style={{ color: theme.link, textDecoration: "none" }}>www.mohamedelafrit.com</a><br /><a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.fr" style={{ color: theme.link, textDecoration: "none" }}>CC BY-NC-SA 4.0</a>

// ─── CONTENT ──────────────────────────────────────────────────────────
function Content() {
  const { theme } = useTheme();

  return (
    <>
      {/* ═══ INTRO ═══ */}
      <Sec id="intro" title="Introduction" level={1}>
        <Sec id="intro-objectif" title="Objectif du projet" level={2}>
          <Box type="objectif" title="Ce que vous allez construire">
            <P style={{ marginBottom: 0 }}>En 6 étapes, vous allez appliquer <B>toutes les notions des 4 jours</B> sur un même dataset pour construire, étape par étape, un système complet de prédiction du salaire d'un développeur — de l'exploration des données jusqu'au réseau de neurones.</P>
          </Box>
        </Sec>
        <Sec id="intro-dataset" title="Le dataset fil rouge" level={2}>
          <P>Notre dataset contient <B>30 développeurs</B> avec 5 features (expérience, nb_langages, niveau_etudes, taille_entreprise, remote) et une variable cible (salaire en k€).</P>
        </Sec>
      </Sec>

      {/* ═══ ÉTAPE 1 ═══ */}
      <Sec id="etape1" title="Étape 1 — Exploration des données (Jour 1)" level={1}>
        <Box type="objectif" title="Objectif">
          <P style={{ marginBottom: 0 }}>Charger le dataset, calculer les statistiques descriptives, identifier les features les plus corrélées au salaire.</P>
        </Box>
        <Box type="definition" title="Rappel : corrélation">
          <P style={{ marginBottom: 0 }}>La corrélation <M t={"r \\in [-1, 1]"} /> mesure la liaison linéaire entre deux variables. <M t={"r = 1"} /> : parfaitement corrélées. <M t={"r = 0"} /> : aucune liaison linéaire.</P>
        </Box>

        <Sec id="e1-chargement" title="1.1 Charger le dataset" level={2}>
          <PythonCell title="Étape 1.1 — Chargement et aperçu" code={`import numpy as np

${DATA_PY}

print(f"Dataset : {data.shape[0]} observations x {data.shape[1]} colonnes")
print(f"\\nColonnes : {noms}")
print(f"\\n5 premieres lignes :")
print(data[:5])`} />
        </Sec>

        <Sec id="e1-stats" title="1.2 Statistiques descriptives" level={2}>
          <PythonCell title="Étape 1.2 — Statistiques par colonne" code={`import numpy as np

${DATA_PY}

print(f"{'Colonne':<20} {'Moy':>8} {'Std':>8} {'Min':>8} {'Max':>8}")
print("-" * 55)
for j, nom in enumerate(noms):
    col = data[:, j]
    print(f"{nom:<20} {col.mean():>8.1f} {col.std():>8.1f} {col.min():>8.1f} {col.max():>8.1f}")`} />
        </Sec>

        <Sec id="e1-correlations" title="1.3 Corrélations avec le salaire" level={2}>
          <PythonCell title="Étape 1.3 — Heatmap des corrélations" code={`import numpy as np
import matplotlib.pyplot as plt

${DATA_PY}

salaire = data[:, 5]

# Calculer les correlations
print("=== Correlations avec le salaire ===")
correlations = []
for j in range(5):
    r = np.corrcoef(data[:, j], salaire)[0, 1]
    correlations.append(r)
    print(f"  {noms[j]:<20} r = {r:+.3f}")

# Visualisation
fig, axes = plt.subplots(1, 5, figsize=(18, 3.5))
for j in range(5):
    r = correlations[j]

      <Sec id="etape2" title="Étape 2 — Régression linéaire from scratch (Jour 1)" level={1}>
        <Box type="objectif" title="Objectif">
          <P style={{ marginBottom: 0 }}>Construire la matrice <M t={"\\mathbf{X}"} /> et le vecteur <M t={"\\mathbf{y}"} />, calculer des prédictions <M t={"\\hat{\\mathbf{y}} = \\mathbf{Xw}"} />, mesurer l'erreur avec le MSE.</P>
        </Box>
        <Box type="definition" title="Rappel : MSE">
          <M d t={"\\text{MSE} = \\frac{1}{n} \\sum_{i=1}^{n} (y_i - \\hat{y}_i)^2"} />
        </Box>

        <Sec id="e2-construction" title="2.1 Construire X et y" level={2}>
          <PythonCell title="Étape 2.1 — Matrice de features et vecteur cible" code={`import numpy as np

${DATA_PY}

      <Sec id="etape3" title="Étape 3 — Optimiser par descente de gradient (Jour 2)" level={1}>

          <P style={{ marginBottom: 0 }}>Utiliser la descente de gradient pour trouver automatiquement les meilleurs poids, tracer la convergence, comparer avec scikit-learn.</P>
        </Box>
        <Box type="definition" title="Rappel : descente de gradient">
          <M d t={"w \\leftarrow w - \\alpha \\cdot \\frac{\\partial J}{\\partial w}"} />
        </Box>

        <Sec id="e3-gradient" title="3.1 Descente de gradient from scratch" level={2}>
          <PythonCell title="Étape 3.1 — Optimisation" code={`import numpy as np
import matplotlib.pyplot as plt

${DATA_PY}

x = data[:, 0]; y = data[:, 5]  # experience -> salaire
n = len(y)

# Parametres initiaux
w, b = 0.0, 0.0
alpha = 0.001
n_iter = 5000
hist_mse = []

for it in range(n_iter):
    y_pred = w * x + b
    errors = y - y_pred
    dw = -2/n * np.sum(x * errors)
    db = -2/n * np.sum(errors)
    w -= alpha * dw
    b -= alpha * db
    hist_mse.append(np.mean(errors ** 2))

print(f"Apres {n_iter} iterations :")
print(f"  y = {w:.4f} * experience + {b:.4f}")
print(f"  MSE = {hist_mse[-1]:.2f}")

fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(13, 5))

ax1.plot(hist_mse, 'b-', lw=1.5)
ax1.set_xlabel("Iteration"); ax1.set_ylabel("MSE")
ax1.set_title("Convergence de la descente de gradient")
ax1.grid(True, alpha=0.3)

ax2.scatter(x, y, c='#3b82f6', s=40, label='Donnees')
xl = np.linspace(0, 21, 100)
ax2.plot(xl, w*xl+b, 'r-', lw=2, label=f'y={w:.2f}x+{b:.2f}')
ax2.set_xlabel("Experience"); ax2.set_ylabel("Salaire (k EUR)")
ax2.set_title("Regression optimisee"); ax2.legend()
ax2.grid(True, alpha=0.3)
plt.tight_layout(); plt.show()`} />

        <Sec id="e3-convergence" title="3.2 Analyse de la convergence" level={2}>

            <P style={{ marginBottom: 0 }}>Combien d'itérations faut-il pour que le MSE se stabilise ? Que se passe-t-il si vous changez <M t={"\\alpha"} /> à 0.01 ? à 0.0001 ?</P>
          </Box>
        </Sec>

        <Sec id="e3-sklearn" title="3.3 Vérification scikit-learn" level={2}>
          <PythonCell title="Étape 3.3 — Comparaison avec sklearn" code={`import numpy as np

${DATA_PY}

x = data[:, 0]; y = data[:, 5]

# Formule analytique (moindres carres)
xm, ym = x.mean(), y.mean()
w_exact = np.sum((x-xm)*(y-ym)) / np.sum((x-xm)**2)
b_exact = ym - w_exact * xm

# Gradient descent (meme code)
w, b = 0.0, 0.0
for _ in range(5000):
    err = y - (w*x + b)
    w -= 0.001 * (-2/len(y) * np.sum(x * err))
    b -= 0.001 * (-2/len(y) * np.sum(err))

print("=== Comparaison ===")
print(f"{'Methode':<20} | {'w':>8} | {'b':>8} | {'MSE':>8}")
print("-" * 52)
print(f"{'Analytique':<20} | {w_exact:>8.4f} | {b_exact:>8.4f} | {np.mean((y-w_exact*x-b_exact)**2):>8.2f}")
print(f"{'Gradient descent':<20} | {w:>8.4f} | {b:>8.4f} | {np.mean((y-w*x-b)**2):>8.2f}")`} />

        <Sec id="e4-perceptron" title="4.2 Perceptron from scratch" level={2}>
          <PythonCell title="Étape 4.2 — Perceptron" code={`import numpy as np
import matplotlib.pyplot as plt

${DATA_PY}

X = data[:, :2]  # experience, nb_langages
y = (data[:, 5] > 45).astype(int)
n = len(y)

# Entrainement
w = np.zeros(2); b = 0.0; alpha = 0.1
hist_acc = []

for epoch in range(100):
    for i in range(n):
        z = w @ X[i] + b
        yp = 1 if z > 0 else 0
        if yp != y[i]:
            err = y[i] - yp
            w = w + alpha * err * X[i]
            b = b + alpha * err
    acc = np.mean([(1 if (w@X[j]+b)>0 else 0)==y[j] for j in range(n)])
    hist_acc.append(acc)

print(f"Accuracy perceptron : {hist_acc[-1]:.0%}")
print(f"Poids : w = [{w[0]:.3f}, {w[1]:.3f}], b = {b:.3f}")`} />

import matplotlib.pyplot as plt

${DATA_PY}

X = data[:, :2]; y = (data[:, 5] > 45).astype(int)

w = np.zeros(2); b = 0.0
for _ in range(100):

        z = w @ X[i] + b; yp = 1 if z > 0 else 0

for c, color, label in [(0,'#e74c3c','<= 45k'),(1,'#2ecc71','> 45k')]:

if abs(w[1]) > 1e-6:
    x1 = np.linspace(-1, 21, 100)
    x2 = -(w[0]/w[1]) * x1 - b/w[1]
    ax.plot(x1, x2, 'k--', lw=2, label=f'Frontiere ({acc_perc:.0%})')

          <P style={{ marginBottom: 0 }}>Construire un réseau 2-4-1 qui dépasse le perceptron grâce à une frontière non linéaire.</P>
        </Box>
        <Box type="definition" title="Rappel : forward pass">
          <M d t={"\\mathbf{h} = \\sigma(\\mathbf{W}^{(1)}\\mathbf{x} + \\mathbf{b}^{(1)}) \\qquad \\hat{y} = \\sigma(\\mathbf{w}^{(2)T}\\mathbf{h} + b^{(2)})"} />
        </Box>

        <Sec id="e5-reseau" title="5.1 Réseau 2-4-1 from scratch" level={2}>
          <PythonCell title="Étape 5.1 — MLP avec backpropagation" code={`import numpy as np
import matplotlib.pyplot as plt

def sigmoid(z): return 1 / (1 + np.exp(-np.clip(z, -500, 500)))
def sigmoid_d(a): return a * (1 - a)

${DATA_PY}

X_raw = data[:, :2]; y = (data[:, 5] > 45).astype(float).reshape(-1, 1)

# Normalisation (essentiel !)
mu = X_raw.mean(axis=0); std = X_raw.std(axis=0)
X = (X_raw - mu) / std
n = len(y)

# Reseau 2-4-1
np.random.seed(42)
W1 = np.random.randn(2, 4) * 0.5; b1 = np.zeros((1, 4))
W2 = np.random.randn(4, 1) * 0.5; b2 = np.zeros((1, 1))
alpha = 0.5; hist_loss = []

for epoch in range(2000):
    h = sigmoid(X @ W1 + b1)
    out = sigmoid(h @ W2 + b2)
    loss = np.mean((y - out) ** 2)
    hist_loss.append(loss)

    d_out = (out - y) * sigmoid_d(out)
    W2 -= alpha * (h.T @ d_out) / n
    b2 -= alpha * np.mean(d_out, axis=0, keepdims=True)
    d_h = (d_out @ W2.T) * sigmoid_d(h)
    W1 -= alpha * (X.T @ d_h) / n
    b1 -= alpha * np.mean(d_h, axis=0, keepdims=True)

acc_mlp = np.mean((out > 0.5).astype(int) == y)
print(f"Accuracy reseau 2-4-1 : {acc_mlp:.0%}")

# Surface de decision
fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(14, 5))

ax1.plot(hist_loss, 'b-', lw=1)
ax1.set_xlabel("Epoch"); ax1.set_ylabel("Loss")
ax1.set_title("Convergence"); ax1.grid(True, alpha=0.3)

xx, yy = np.meshgrid(np.linspace(X[:,0].min()-1, X[:,0].max()+1, 100),
                       np.linspace(X[:,1].min()-1, X[:,1].max()+1, 100))
grid = np.c_[xx.ravel(), yy.ravel()]
h_g = sigmoid(grid @ W1 + b1)
z_g = sigmoid(h_g @ W2 + b2).reshape(xx.shape)
ax2.contourf(xx, yy, z_g, levels=20, cmap='RdYlGn', alpha=0.5)
ax2.contour(xx, yy, z_g, levels=[0.5], colors='black', linewidths=2)
for c, col in [(0,'#e74c3c'),(1,'#2ecc71')]:
    mask = y.flatten() == c
    ax2.scatter(X[mask,0], X[mask,1], c=col, s=60, edgecolors='white', lw=0.5)
ax2.set_title(f"Surface de decision ({acc_mlp:.0%})")
ax2.set_xlabel("Exp (norm)"); ax2.set_ylabel("Lang (norm)")
plt.tight_layout(); plt.show()`} />
        </Sec>
