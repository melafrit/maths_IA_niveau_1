const ThemeContext = createContext();
function ThemeProvider({ children }) {
  const [mode, setMode] = useState('light');
  const theme = THEMES[mode];
  const toggle = () => setMode(m => m === 'light' ? 'dark' : 'light');
  return <ThemeContext.Provider value={{ mode, theme, toggle }}>{children}</ThemeContext.Provider>;
}
function useTheme() { return useContext(ThemeContext); }

/* ============================================================================
   MATH COMPONENT (KaTeX)
============================================================================ */
function M({ t, d }) {
  if (!window.katex) return <code style={{ fontSize:'0.9em' }}>{t}</code>;
  try {
    const html = window.katex.renderToString(t, { throwOnError: false, displayMode: !!d });
    if (d) return <div style={{ margin:'18px 0', textAlign:'center', overflowX:'auto' }} dangerouslySetInnerHTML={{ __html: html }} />;
    return <span dangerouslySetInnerHTML={{ __html: html }} />;
  } catch { return <code>{t}</code>; }
}

function Sidebar({ activeId }) {

  const scrollTo = (id) => { document.getElementById(id)?.scrollIntoView({ behavior:'smooth' }); setMobileOpen(false); };

              border:`1px solid ${theme.accent}` }}>J{j}</div>
            : <a key={j} href={`jour${j}.html`} style={{ flex:1, textAlign:'center', padding:'3px 0', borderRadius:'4px', fontFamily:"'DM Sans',sans-serif",
              fontSize:'0.72rem', fontWeight:400, background:'transparent', color:theme.textMuted, textDecoration:'none',
              cursor:'pointer', border:`1px solid ${theme.border}` }}>J{j}</a>
          ))}
        </div>
      </div>
      <nav style={{ flex:1, overflowY:'auto', padding:'8px 0' }}>
        {SECTIONS.map(sec => {
          const isOpen = !collapsed[sec.id];
          const isActive = activeId===sec.id || sec.children?.some(c=>c.id===activeId);
          return (
            <div key={sec.id}>
              <div onClick={()=>{scrollTo(sec.id);if(sec.children)tog(sec.id);}}

                {sec.children&&<span style={{ fontSize:'0.55rem', transition:'transform 0.2s', transform:isOpen?'rotate(90deg)':'rotate(0)', display:'inline-block' }}>▶</span>}
                <span style={{ flex:1 }}>{sec.title}</span>
              </div>
              {sec.children&&isOpen&&sec.children.map(ch=>{
                const ca = activeId===ch.id;
                return <div key={ch.id} onClick={()=>scrollTo(ch.id)} style={{ padding:'4px 14px 4px 42px', cursor:'pointer',

/* ============================================================================
   QCM QUESTION COMPONENT
============================================================================ */
function QCMQuestion({ q, answers, setAnswers, revealed, setRevealed }) {
  const { theme, mode } = useTheme();
  const chosen = answers[q.id];
  const rev = revealed[q.id];
  const em = q.niv.split(' ')[0];
  const dc = DIFF_COLORS[em] || {};

  return (
    <div id={"q"+q.id} style={{
      marginBottom:'28px', background:theme.bgAlt, border:`1px solid ${theme.border}`,
      borderRadius:'12px', overflow:'hidden', scrollMarginTop:'24px',
      boxShadow: mode==='dark' ? '0 2px 10px rgba(0,0,0,0.4)' : '0 2px 10px rgba(0,0,0,0.05)'
    }}>
      {/* En-tête question */}
      <div style={{ padding:'14px 22px 0', display:'flex', flexWrap:'wrap', gap:'8px', alignItems:'center' }}>
        <span style={{
          background:theme.accent, color:'#fff', borderRadius:'50%', width:'30px', height:'30px',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontFamily:"'DM Sans',sans-serif", fontWeight:800, fontSize:'0.88rem', flexShrink:0
        }}>{q.id}</span>
        <span style={{
          background: mode==='dark' ? dc.dbg : dc.bg,
          color: mode==='dark' ? dc.dtx : dc.tx,
          border:`1px solid ${dc.bd}`, borderRadius:'12px', padding:'3px 11px',
          fontSize:'0.75rem', fontFamily:"'DM Sans',sans-serif", fontWeight:600
        }}>{q.niv}</span>
        <span style={{
          background:theme.bgCode, color:theme.textMuted, borderRadius:'8px',
          padding:'3px 10px', fontSize:'0.72rem', fontFamily:"'DM Sans',sans-serif",
          marginLeft:'auto'
        }}>{q.theme}</span>
      </div>

      {/* Énoncé */}
      <div style={{ padding:'12px 22px', lineHeight:1.8, fontSize:'1rem', color:theme.text }}>
        {q.isK ? <M t={q.en} d /> : <span>{q.en}</span>}
      </div>

      {/* Options */}
      <div style={{ padding:'0 22px 16px', display:'flex', flexDirection:'column', gap:'8px' }}>
        {q.opts.map(opt => {
          const sel = chosen===opt.l;
          const bon = opt.l===q.ok;
          let bg = theme.bg, bd = theme.border, tc = theme.text;
          if (sel && !rev) { bg = theme.qcmSelectBg; bd = theme.accent; }
          if (rev && bon)  { bg = theme.qcmCorrectBg; bd = theme.qcmCorrectBorder; tc = theme.qcmCorrectText; }
          if (rev && sel && !bon) { bg = theme.qcmWrongBg; bd = theme.qcmWrongBorder; tc = theme.qcmWrongText; }

          return (
            <button
              key={opt.l}
              onClick={() => !rev && setAnswers(p => ({ ...p, [q.id]: opt.l }))}
              style={{
                display:'flex', alignItems:'flex-start', gap:'12px',
                background:bg, border:`2px solid ${bd}`, borderRadius:'8px',
                padding:'11px 14px', cursor:rev?'default':'pointer',
                textAlign:'left', transition:'all 0.2s', color:tc, width:'100%',
                fontFamily:"'Source Serif 4',Georgia,serif"
              }}
            >
              <span style={{
                minWidth:'28px', height:'28px', borderRadius:'50%',
                border:`2px solid ${bd}`, display:'flex', alignItems:'center',
                justifyContent:'center', fontFamily:"'DM Sans',sans-serif",
                fontWeight:700, fontSize:'0.82rem', flexShrink:0,
                background:(sel||(rev&&bon))?bd:'transparent',
                color:(sel||(rev&&bon))?'#fff':tc
              }}>{opt.l}</span>
              <span style={{ lineHeight:1.6, fontSize:'0.94rem', flex:1 }}>
                {opt.k ? <M t={opt.k} /> : (opt.kpre ? <M t={opt.kpre} /> : opt.tx)}
                {rev && bon && <span style={{ marginLeft:'8px' }}>✓</span>}
                {rev && sel && !bon && <span style={{ marginLeft:'8px' }}>✗</span>}
              </span>
            </button>
          );
        })}
      </div>

      {/* Bouton révéler */}
      {!rev && (
        <div style={{ padding:'0 22px 18px' }}>
          <button
            onClick={() => setRevealed(p => ({ ...p, [q.id]: true }))}
            style={{
              background:theme.accent, color:'#fff', border:'none', borderRadius:'8px',
              padding:'9px 22px', fontFamily:"'DM Sans',sans-serif", fontWeight:600,
              cursor:'pointer', fontSize:'0.88rem'
            }}
          >
            📖 Voir la correction détaillée
          </button>
        </div>
      )}

      {/* Correction */}
      {rev && (
        <div style={{ borderTop:`1px solid ${theme.border}`, background:theme.bg, padding:'18px 22px 22px' }}>
          {/* Bonne réponse */}
          <div style={{
            background:theme.qcmCorrectBg, border:`1px solid ${theme.qcmCorrectBorder}`,
            borderRadius:'8px', padding:'12px 16px', marginBottom:'14px'
          }}>
            <p style={{
              margin:'0 0 6px', fontFamily:"'DM Sans',sans-serif",
              fontWeight:700, color:'#15803d', fontSize:'0.8rem'
            }}>✅ BONNE RÉPONSE — {q.ok}</p>
            <p style={{
              margin:0, fontSize:'0.93rem', lineHeight:1.7, color:theme.qcmCorrectText
            }}>{q.expOk}</p>
          </div>

          {/* Calcul étape par étape */}
          {q.steps && (
            <div style={{
              background:theme.bgAlt, border:`1px solid ${theme.border}`,
              borderRadius:'8px', padding:'14px 16px', marginBottom:'14px'
            }}>
              <p style={{
                margin:'0 0 10px', fontFamily:"'DM Sans',sans-serif", fontWeight:700,
                fontSize:'0.75rem', color:theme.textMuted,
                textTransform:'uppercase', letterSpacing:'0.06em'
              }}>📐 Calcul étape par étape</p>
              <table style={{ borderCollapse:'collapse', width:'100%' }}>
                <tbody>
                  {q.steps.map((s, i) => (
                    <tr key={i} style={{
                      borderBottom: i < q.steps.length-1 ? `1px solid ${theme.borderLight}` : 'none'
                    }}>
                      <td style={{
                        padding:'6px 12px 6px 0', fontFamily:"'DM Sans',sans-serif",
                        fontSize:'0.75rem', color:theme.textMuted, whiteSpace:'nowrap'
                      }}>Étape {i+1}</td>
                      <td style={{ padding:'6px 16px 6px 0', color:theme.text }}>
                        <M t={s.s} />
                      </td>
                      <td style={{ padding:'6px 0', color:theme.accent, fontWeight:700 }}>
                        <M t={"=\\ "+s.r} />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Calcul formule directe */}
          {q.calcStr && (
            <div style={{
              background:theme.bgAlt, border:`1px solid ${theme.border}`,
              borderRadius:'8px', padding:'14px 20px', marginBottom:'14px'
            }}>
              <p style={{
                margin:'0 0 10px', fontFamily:"'DM Sans',sans-serif", fontWeight:700,
                fontSize:'0.75rem', color:theme.textMuted,
                textTransform:'uppercase', letterSpacing:'0.06em'
              }}>📐 Calcul détaillé</p>
              <M t={q.calcStr} d />
            </div>
          )}

          {/* Mauvaises réponses */}
          <p style={{
            margin:'0 0 8px', fontFamily:"'DM Sans',sans-serif", fontWeight:700,
            fontSize:'0.75rem', color:theme.textMuted,
            textTransform:'uppercase', letterSpacing:'0.06em'
          }}>❌ Pourquoi les autres réponses sont incorrectes</p>
          {Object.entries(q.expNok).map(([letter, text]) => (
            <div key={letter} style={{
              marginBottom:'8px', padding:'10px 14px',
              background:theme.qcmWrongBg, border:`1px solid ${theme.qcmWrongBorder}44`,
              borderRadius:'6px', fontSize:'0.9rem', lineHeight:1.65,
              color:theme.text
            }}>
              <strong style={{ fontFamily:"'DM Sans',sans-serif", color:theme.qcmWrongBorder }}>Réponse {letter} : </strong>
              {text}
            </div>
          ))}

          {/* Piège */}
          <div style={{
            marginTop:'14px', padding:'12px 16px',
            background:theme.qcmHintBg, border:`1px solid ${theme.qcmHintBorder}`,
            borderRadius:'8px', fontSize:'0.9rem', lineHeight:1.65, color:theme.text
          }}>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontWeight:700, color:'#d97706' }}>⚠️ Piège à éviter : </span>
            {q.piege}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================================
   QCM CONTENT — organisé par section (mêmes IDs que jour1.html)
============================================================================ */
function QCMContent({ answers, setAnswers, revealed, setRevealed }) {
  const { theme } = useTheme();
  const sectionTitles = {
    'ia-fonction':"1. L'IA comme fonction mathématique",
    'dataset':"2. Dataset : observations et features",
    'vecteurs':"3. Vecteurs",
    'matrices':"4. Matrices",
    'produit-scalaire':"5. Produit scalaire",
    'mat-vec':"6. Multiplication matrice-vecteur",
    'regression':"7. Régression linéaire",
  };

  // Grouper par section dans l'ordre
  const groups = {};
  QUESTIONS.forEach(q => {
    if (!groups[q.sec]) groups[q.sec] = [];
    groups[q.sec].push(q);
  });

  return (
    <>
      {Object.keys(sectionTitles).map(secId => (
        <Sec key={secId} id={secId} title={sectionTitles[secId]} level={1}>
          <P style={{ color:theme.textMuted, fontSize:'0.92rem', marginBottom:'20px' }}>
            <em>{groups[secId]?.length || 0} question{(groups[secId]?.length || 0) > 1 ? 's' : ''} sur ce chapitre</em>
          </P>
          {groups[secId]?.map(q => (
            <QCMQuestion
              key={q.id}
              q={q}
              answers={answers}
              setAnswers={setAnswers}
              revealed={revealed}
              setRevealed={setRevealed}
            />
          ))}
        </Sec>
      ))}
    </>
  );
}

/* ============================================================================
   SCORE BAR (fixe en haut pendant qu'on répond)
============================================================================ */
function ScoreBar({ answers, revealed }) {
  const { theme } = useTheme();
  const answered = Object.keys(answers).length;
  const reveals = Object.keys(revealed).length;
  const correct = Object.entries(answers).filter(([id, a]) => QUESTIONS.find(q => q.id === +id)?.ok === a).length;
  const total = QUESTIONS.length;

  if (answered === 0) return null;

  return (
    <div style={{
      position:'sticky', top:'0', zIndex:50,
      background:theme.bgAlt, borderBottom:`1px solid ${theme.border}`,
      padding:'10px 20px', marginBottom:'24px', borderRadius:'8px',
      display:'flex', alignItems:'center', gap:'14px', flexWrap:'wrap',
      boxShadow: `0 2px 8px ${theme.bg}99`
    }}>
      <span style={{
        color:theme.accent, fontWeight:700, fontSize:'0.9rem',
        fontFamily:"'DM Sans',sans-serif"
      }}>
        Score : {correct} / {total}
      </span>
      <div style={{ flex:1, minWidth:'120px', height:'7px', background:theme.border, borderRadius:'4px' }}>
        <div style={{
          width:`${(correct/total)*100}%`, height:'100%',
          background: correct===total ? '#22c55e' : theme.accent,
          borderRadius:'4px', transition:'width 0.4s'
        }} />
      </div>
      <span style={{
        fontSize:'0.8rem', color:theme.textMuted,
        fontFamily:"'DM Sans',sans-serif", whiteSpace:'nowrap'
      }}>
        {answered}/{total} répondues · {reveals}/{total} corrigées
      </span>
    </div>
  );
}

/* ============================================================================
   FINAL BILAN (affiché quand tout est révélé)
============================================================================ */
function FinalBilan({ answers, revealed }) {
  const { theme } = useTheme();
  if (Object.keys(revealed).length !== QUESTIONS.length) return null;

  const correct = Object.entries(answers).filter(([id, a]) => QUESTIONS.find(q => q.id === +id)?.ok === a).length;
  const total = QUESTIONS.length;
  const pct = (correct/total)*100;

  let msg, mood;
  if (correct === total) { msg = "🎉 Parfait ! Vous maîtrisez le Jour 1 à 100%."; mood = 'retenir'; }
  else if (pct >= 80) { msg = "👏 Très bien ! Quelques points à approfondir."; mood = 'retenir'; }
  else if (pct >= 60) { msg = "👍 Bien ! Relisez les sections où vous avez fait des erreurs."; mood = 'intuition'; }
  else if (pct >= 40) { msg = "📚 À retravailler — revenez sur la fiche de synthèse."; mood = 'attention'; }
  else { msg = "⚠️ Reprenez les chapitres 1 à 7 avant de passer au Jour 2."; mood = 'attention'; }

  return (
    <Box type={mood} title="Bilan final">
      <div style={{ textAlign:'center' }}>
        <p style={{
          margin:'0 0 12px', fontFamily:"'DM Sans',sans-serif",
          fontSize:'1.05rem', fontWeight:700, color:theme.text
        }}>{msg}</p>
        <p style={{
          margin:'0 0 12px', fontFamily:"'DM Sans',sans-serif",
          fontSize:'2.6rem', fontWeight:800, color:theme.accent, lineHeight:1
        }}>{correct} / {total}</p>
        <p style={{
          margin:0, fontFamily:"'DM Sans',sans-serif",
          fontSize:'0.85rem', color:theme.textMuted
        }}>
          {pct >= 70
            ? "Prêt·e pour le Jour 2 — Optimisation et descente de gradient !"
            : "Relisez la fiche de synthèse du Jour 1 avant de continuer."}
        </p>
      </div>
    </Box>
  );
}

/* ============================================================================
   ROOT — structure identique à jour1.html
============================================================================ */
function Jour1QCMPage() {
  const [activeId, setActiveId] = useState('');
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});

  useEffect(() => {
    const ids = [];
    SECTIONS.forEach(s => { ids.push(s.id); s.children?.forEach(c => ids.push(c.id)); });
    const obs = new IntersectionObserver(entries => {
      const vis = entries.filter(e => e.isIntersecting).sort((a,b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (vis.length) setActiveId(vis[0].target.id);
    }, { rootMargin: '-10% 0px -80% 0px' });
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  return (
    <ThemeProvider>
      <Shell
        activeId={activeId}
        answers={answers} setAnswers={setAnswers}
        revealed={revealed} setRevealed={setRevealed}
      />
    </ThemeProvider>
  );
}
