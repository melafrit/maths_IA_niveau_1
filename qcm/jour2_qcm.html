    function M({ t, d = false }) {
      const [ready, setReady] = useState(!!window.katex);
      useEffect(() => {
        if (ready) return;
        const id = setInterval(() => { if (window.katex) { setReady(true); clearInterval(id); } }, 100);
        return () => clearInterval(id);
      }, []);
      if (!ready) return <code style={{ fontFamily: "monospace", fontSize: "0.9em" }}>{t}</code>;
      try {
        const html = window.katex.renderToString(t, { displayMode: d, throwOnError: false });
        return <span dangerouslySetInnerHTML={{ __html: html }} />;
      } catch { return <span>{t}</span>; }
    }

                    style={{
                      background: filter === b.val ? ACC : "transparent",
                      color: filter === b.val ? "#fff" : (D ? "#c9d1d9" : "#1a1a2e"),
                      border: `1px solid ${filter === b.val ? ACC : BORDER}`,
                      borderRadius: 6, padding: "4px 10px", cursor: "pointer",
                      fontFamily: "'DM Sans', sans-serif", fontSize: "0.78rem", fontWeight: 600,
                    }}
                  >
                    {b.label}
                  </button>
                ))}
                {Object.keys(answers).length > 0 && (
                  <button
                    onClick={resetAll}
                    style={{ background: "transparent", color: D ? "#8b949e" : "#6b7280", border: `1px solid ${BORDER}`, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: "0.78rem" }}
                  >
                    🔄 Reset
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* ── QUESTIONS ── */}
          <div style={{ maxWidth: 860, margin: "0 auto", padding: "28px 18px 60px" }}>
            {visibleQS.map(q => {
              const chosen = answers[q.id];
              const rev    = revealed[q.id];
              const em     = q.niv.split(" ")[0];
              const dc     = DIFF[em] || {};

              return (
                <div key={q.id} id={`q${q.id}`} style={{ marginBottom: 28, background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, overflow: "hidden", boxShadow: D ? "0 2px 12px rgba(0,0,0,0.5)" : "0 2px 12px rgba(0,0,0,0.07)", scrollMarginTop: 70 }}>

                  {/* en-tête question */}
                  <div style={{ padding: "16px 22px 0", display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
                    <span style={{ background: ACC, color: "#fff", borderRadius: "50%", width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: "0.88rem", fontFamily: "'DM Sans', sans-serif", flexShrink: 0 }}>
                      {q.id}
                    </span>
                    <span style={{ background: dc.bg || "#f3f4f6", color: dc.tx || "#374151", border: `1px solid ${dc.bd || "#e5e7eb"}`, borderRadius: 12, padding: "3px 11px", fontSize: "0.75rem", fontFamily: "'DM Sans', sans-serif", fontWeight: 600 }}>
                      {q.niv}
                    </span>
                    <span style={{ background: D ? "#21262d" : "#f1f5f9", color: D ? "#8b949e" : "#64748b", borderRadius: 8, padding: "3px 10px", fontSize: "0.72rem", fontFamily: "'DM Sans', sans-serif", marginLeft: "auto" }}>
                      {q.theme}
                    </span>
                  </div>

                  {/* énoncé */}
                  <div style={{ padding: "14px 22px", lineHeight: 1.8, fontSize: "0.97rem" }}>
                    {q.isK
                      ? <M t={q.enonce} d={true} />
                      : <span>{q.enonce}</span>
                    }
                  </div>

                  {/* options */}
                  <div style={{ padding: "0 22px 18px", display: "flex", flexDirection: "column", gap: 9 }}>
                    {q.opts.map(opt => {
                      const sel = chosen === opt.l;
                      const bon = opt.l === q.bonne;
                      let bg = D ? SUBTLE : "#f9fafb";
                      let bd = BORDER;
                      let tc = TEXT;
                      if (sel && !rev) { bg = D ? "#14291c" : "#dcfce7"; bd = ACC; }
                      if (rev && bon) { bg = D ? "#14291c" : "#dcfce7"; bd = "#22c55e"; tc = D ? "#86efac" : "#15803d"; }
                      if (rev && sel && !bon) { bg = D ? "#2d1b1b" : "#fee2e2"; bd = "#ef4444"; tc = D ? "#fca5a5" : "#991b1b"; }

                      return (
                        <button
                          key={opt.l}
                          onClick={() => !rev && setAnswers(p => ({ ...p, [q.id]: opt.l }))}
                          style={{ display: "flex", alignItems: "center", gap: 12, background: bg, border: `2px solid ${bd}`, borderRadius: 8, padding: "11px 14px", cursor: rev ? "default" : "pointer", textAlign: "left", transition: "all 0.2s", color: tc, width: "100%" }}
                        >
                          <span style={{ minWidth: 28, height: 28, borderRadius: "50%", border: `2px solid ${bd}`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: "0.82rem", flexShrink: 0, background: (sel || (rev && bon)) ? bd : "transparent", color: (sel || (rev && bon)) ? "#fff" : tc }}>
                            {opt.l}
                          </span>
                          <span style={{ lineHeight: 1.6, fontSize: "0.93rem" }}>
                            {opt.k ? <M t={opt.k} /> : opt.tx}
                            {rev && bon && <span style={{ marginLeft: 8 }}>✓</span>}
                            {rev && sel && !bon && <span style={{ marginLeft: 8 }}>✗</span>}
                          </span>
                        </button>
                      );
                    })}
                  </div>

                  {/* bouton correction */}
                  {!rev && (
                    <div style={{ padding: "0 22px 20px" }}>
                      <button
                        onClick={() => setRevealed(p => ({ ...p, [q.id]: true }))}
                        style={{ background: ACC, color: "#fff", border: "none", borderRadius: 8, padding: "9px 22px", fontFamily: "'DM Sans', sans-serif", fontWeight: 600, cursor: "pointer", fontSize: "0.88rem" }}
                      >
                        📖 Voir la correction détaillée
                      </button>
                    </div>
                  )}

                  {/* ── CORRECTION ── */}
                  {rev && (
                    <div style={{ borderTop: `1px solid ${BORDER}`, background: D ? "#0d1117" : "#f8fafc", padding: "18px 22px 24px" }}>

                      {/* bonne réponse */}
                      <div style={{ background: D ? "#14291c" : "#dcfce7", border: "1px solid #22c55e", borderRadius: 8, padding: "12px 16px", marginBottom: 14 }}>
                        <p style={{ margin: "0 0 6px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, color: "#15803d", fontSize: "0.8rem" }}>
                          ✅ BONNE RÉPONSE — {q.bonne}
                        </p>
                        <p style={{ margin: 0, fontSize: "0.93rem", lineHeight: 1.7, color: D ? "#86efac" : "#14532d" }}>
                          {q.expB}
                        </p>
                      </div>

                      {/* calcul étape par étape */}
                      {q.steps && (
                        <div style={{ background: D ? "#161b22" : "#fff", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
                          <p style={{ margin: "0 0 10px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: "0.75rem", color: D ? "#8b949e" : "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                            📐 Calcul étape par étape
                          </p>
                          <table style={{ borderCollapse: "collapse", width: "100%" }}>
                            <tbody>
                              {q.steps.map((s, i) => (
                                <tr key={i} style={{ borderBottom: i < q.steps.length - 1 ? `1px solid ${BORDER}` : "none" }}>
                                  <td style={{ padding: "6px 12px 6px 0", fontFamily: "'DM Sans', sans-serif", fontSize: "0.75rem", color: D ? "#8b949e" : "#9ca3af", whiteSpace: "nowrap", verticalAlign: "middle" }}>
                                    Étape {i + 1}
                                  </td>
                                  <td style={{ padding: "6px 16px 6px 0", verticalAlign: "middle" }}><M t={s.s} /></td>
                                  <td style={{ padding: "6px 0", color: ACC, fontWeight: 700, verticalAlign: "middle" }}>{s.r && <M t={"=\\ " + s.r} />}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}

                      {/* calcul formule directe */}
                      {q.calcStr && (
                        <div style={{ background: D ? "#161b22" : "#fff", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "14px 20px", marginBottom: 14, textAlign: "center" }}>
                          <p style={{ margin: "0 0 10px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: "0.75rem", color: D ? "#8b949e" : "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                            📐 Calcul détaillé
                          </p>
                          <M t={q.calcStr} d={true} />
                        </div>
                      )}

                      {/* mauvaises réponses */}
                      <p style={{ margin: "0 0 8px", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: "0.75rem", color: D ? "#8b949e" : "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                        ❌ Pourquoi les autres réponses sont incorrectes
                      </p>
                      {[q.expA, q.expB2, q.expC, q.expD].filter(Boolean).map(e => (
                        <div key={e.l} style={{ marginBottom: 8, padding: "10px 14px", background: D ? "#2d1b1b" : "#fff7f7", border: `1px solid ${D ? "#3d1f1f" : "#fecaca"}`, borderRadius: 6, fontSize: "0.9rem", lineHeight: 1.65 }}>
                          <strong style={{ fontFamily: "'DM Sans', sans-serif", color: "#ef4444" }}>Réponse {e.l} : </strong>
                          {e.tx}
                        </div>
                      ))}

                      {/* piège */}
                      <div style={{ marginTop: 14, padding: "12px 16px", background: D ? "#2d2000" : "#fffbeb", border: `1px solid ${D ? "#713f12" : "#fcd34d"}`, borderRadius: 8, fontSize: "0.9rem", lineHeight: 1.65 }}>
                        <span style={{ fontFamily: "'DM Sans', sans-serif", fontWeight: 700, color: "#d97706" }}>⚠️ Piège à éviter : </span>
                        {q.piege}
                      </div>

                    </div>
                  )}
                </div>
              );
            })}

            {visibleQS.length === 0 && (
              <div style={{ textAlign: "center", padding: "60px 20px", fontFamily: "'DM Sans', sans-serif", color: D ? "#8b949e" : "#6b7280" }}>
                Aucune question ne correspond à ce filtre.
              </div>
            )}

            {/* ── BILAN FINAL ── */}
            {Object.keys(revealed).length === QS.length && (
              <div style={{ background: CARD, border: `2px solid ${ACC}`, borderRadius: 12, padding: "28px 32px", textAlign: "center", marginBottom: 28 }}>
                <p style={{ margin: "0 0 8px", fontFamily: "'DM Sans', sans-serif", fontSize: "1.1rem", fontWeight: 700 }}>
                  {score === QS.length ? "🎉 Parfait !" : score >= 16 ? "👏 Excellent !" : score >= 12 ? "👍 Bien !" : score >= 8 ? "🙂 Correct" : "📚 À retravailler"}
                </p>
                <p style={{ margin: "0 0 14px", fontFamily: "'DM Sans', sans-serif", fontSize: "2.6rem", fontWeight: 800, color: ACC }}>
                  {score} / {QS.length}
                </p>
                <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
                  {["🟢", "🟡", "🟠", "🔴"].map(e => {
                    const s = scoreByLevel(e);
                    return (
                      <span key={e} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: "0.85rem", background: D ? "#21262d" : "#f1f5f9", padding: "6px 12px", borderRadius: 8 }}>
                        {e} <strong>{s.good}</strong>/{s.total}
                      </span>
                    );
                  })}
                </div>
                <p style={{ margin: 0, fontFamily: "'DM Sans', sans-serif", fontSize: "0.85rem", opacity: 0.65 }}>
                  {score < 10
                    ? "Relisez la fiche de synthèse du Jour 2 et refaites les exercices crayon-papier."
                    : score < 16
                    ? "Bon niveau — entraînez-vous sur les questions rouges pour consolider votre compréhension critique."
                    : "Vous maîtrisez l'optimisation — prêt·e pour le Jour 3 : Probabilités et classification !"}
                </p>
              </div>
            )}

            {/* ── FOOTER LICENCE ── */}
            <div style={{ textAlign: "center", fontFamily: "'DM Sans', sans-serif", fontSize: "0.72rem", color: D ? "#484f58" : "#9ca3af", lineHeight: 2, marginTop: 32 }}>
              © 2025 Mohamed EL AFRIT — IPSSI<br />
              Ce contenu est distribué sous licence{" "}
              <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.fr" style={{ color: ACC }}>
                Creative Commons BY-NC-SA 4.0
              </a>
            </div>
          </div>
        </div>
      );
    }

    /* ── Montage ── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<QCMJour2 />);
  </script>
</body>
</html>
