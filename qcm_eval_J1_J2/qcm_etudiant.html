function ThemeProvider({ children }) {
  const [mode, setMode] = useState(() => {
    try {
      const saved = localStorage.getItem(CONFIG.STORAGE_PREFIX + 'theme');
      return saved === 'dark' ? 'dark' : 'light';
    } catch { return 'light'; }
  });
  const theme = THEMES[mode];
  const toggle = () => {
    const next = mode === 'light' ? 'dark' : 'light';
    setMode(next);
    try { localStorage.setItem(CONFIG.STORAGE_PREFIX + 'theme', next); } catch {}
  };
  return (
    <ThemeContext.Provider value={{ mode, theme, toggle }}>
      {children}
    </ThemeContext.Provider>
  );
}

// Rendu KaTeX pour formules inline
function M({ t, d }) {
  if (!window.katex) return <code style={{ fontSize: '0.9em' }}>{t}</code>;
  try {
    const html = window.katex.renderToString(t, { throwOnError: false, displayMode: !!d });
    if (d) return <div style={{ margin: '20px 0', textAlign: 'center', overflowX: 'auto' }}
                       dangerouslySetInnerHTML={{ __html: html }} />;
    return <span dangerouslySetInnerHTML={{ __html: html }} />;
  } catch { return <code>{t}</code>; }
}

// Rendu d'un texte contenant des portions LaTeX délimitées par $...$
function RichText({ text }) {
  if (!text) return null;
  // Sépare par $...$ (inline) — les $$...$$ ne sont pas utilisés dans notre QCM
  const parts = text.split(/(\$[^$]+\$)/g);
  return (
    <>
      {parts.map((p, i) => {
        if (p.startsWith('$') && p.endsWith('$') && p.length >= 2) {
          return <M key={i} t={p.slice(1, -1)} />;
        }
        // Gérer les retours à la ligne + les blocs de code ```python ... ```
        return <TextWithCode key={i} text={p} />;
      })}
    </>
  );
}

// Gère les blocs de code ```python ... ``` et les retours à la ligne
function TextWithCode({ text }) {
  const { theme } = useTheme();
  if (!text) return null;
  // Détecte les blocs de code ```...```
  const parts = text.split(/(```[\s\S]*?```)/g);
  return (
    <>
      {parts.map((p, i) => {
        if (p.startsWith('```') && p.endsWith('```')) {
          // Retire ```python et ```
          const lines = p.split('\n');
          const first = lines[0].replace(/^```\w*/, '');
          const last = lines[lines.length - 1].replace(/```$/, '');
          const body = [first, ...lines.slice(1, -1), last].join('\n').trim();
          return (
            <pre key={i} style={{
              background: theme.codeBg, border: `1px solid ${theme.codeBorder}`,
              borderRadius: '6px', padding: '12px 16px', overflow: 'auto',
              fontFamily: "'JetBrains Mono', monospace", fontSize: '0.9em',
              color: theme.text, margin: '10px 0', lineHeight: 1.5,
            }}>{body}</pre>
          );
        }
        // Rendre les retours à la ligne comme <br/>
        const lines = p.split('\n');
        return (
          <React.Fragment key={i}>
            {lines.map((l, j) => (
              <React.Fragment key={j}>
                {j > 0 && <br />}
                {renderInlineCode(l, theme)}
              </React.Fragment>
            ))}
          </React.Fragment>
        );
      })}
    </>
  );
}

// Gère le code inline `...`
function renderInlineCode(text, theme) {
  const parts = text.split(/(`[^`]+`)/g);
  return parts.map((p, i) => {
    if (p.startsWith('`') && p.endsWith('`') && p.length >= 2) {
      return (
        <code key={i} style={{
          background: theme.bgCode, padding: '2px 6px', borderRadius: '3px',
          fontFamily: "'JetBrains Mono', monospace", fontSize: '0.88em',
          color: theme.text,
        }}>{p.slice(1, -1)}</code>
      );
    }
    return <React.Fragment key={i}>{p}</React.Fragment>;
  });
}

// Fisher-Yates shuffle (avec seed pour reproductibilité si besoin)
function shuffle(array) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Retourne la permutation : nouvelleListe[i] = ancienneListe[permutation[i]]
function shuffleWithPermutation(array) {
  const indices = array.map((_, i) => i);
  const permutation = shuffle(indices);
  const shuffled = permutation.map(i => array[i]);
  return { shuffled, permutation };
}

// SHA-256 via Web Crypto API
async function sha256Hex(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const bytes = Array.from(new Uint8Array(hashBuffer));
  return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Échappe une cellule pour CSV (guillemets si contient , " ou \n)
function csvCell(val) {
  if (val === null || val === undefined) return '';
  const s = String(val);
  if (/[",\n\r]/.test(s)) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

// Formate secondes → "mm:ss" ou "hh:mm:ss"
function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) {
    return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  }
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

// Validation email
function isEmailValid(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Normalise un NOM en MAJUSCULES sans accents pour le nom de fichier
function normalizeForFilename(s) {
  return (s || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^A-Za-z0-9]/g, '')
    .toUpperCase();
}

function normalizePrenomForFilename(s) {
  const up = normalizeForFilename(s);
  if (!up) return '';
  return up.charAt(0).toUpperCase() + up.slice(1).toLowerCase();
}

// Date YYYYMMDD
function dateStampYMD() {
  const d = new Date();
  return d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
}

// Tronque un énoncé pour le CSV (retire les balises LaTeX et code)
function troncateEnonce(enonce, maxLen = 180) {
  let s = (enonce || '')
    .replace(/\$[^$]*\$/g, '[formule]')
    .replace(/```[\s\S]*?```/g, '[code]')
    .replace(/`[^`]+`/g, '[code]')
    .replace(/\s+/g, ' ')
    .trim();
  if (s.length > maxLen) s = s.slice(0, maxLen - 1) + '…';
  return s;
}

  );

/* ============================================================================
   ÉCRAN 2 — QCM EN COURS
   ============================================================================ */
function QuizScreen({
  questions, answers, currentIndex, elapsedSec,
  onAnswer, onNavigate, onSubmitRequest,
}) {
  const { theme } = useTheme();
  const q = questions[currentIndex];
  const total = questions.length;
  const answered = Object.keys(answers).length;
  const currentAnswer = answers[q.id]; // index de la proposition choisie (dans l'ordre randomisé)

  const jumpToFirstUnanswered = () => {
    const idx = questions.findIndex(qq => answers[qq.id] === undefined);
    if (idx >= 0) onNavigate(idx);
  };

  return (
    <div style={{ maxWidth: '860px', margin: '0 auto', padding: '24px 24px 80px' }}>
      {/* HEADER : progression + chrono */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        flexWrap: 'wrap', gap: '12px', marginBottom: '16px',
      }}>
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: '0.9rem',
          color: theme.textSecondary, fontWeight: 500,
        }}>
          Question <strong style={{ color: theme.text }}>{currentIndex + 1}</strong> / {total}
          <span style={{ margin: '0 12px', color: theme.textMuted }}>|</span>
          Répondues : <strong style={{ color: answered === total ? theme.success : theme.text }}>{answered}</strong> / {total}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: '1rem',
            background: theme.bgAlt, padding: '6px 12px', borderRadius: '6px',
            border: `1px solid ${theme.border}`, color: theme.text, fontWeight: 500,
          }}>
            ⏱️ {formatDuration(elapsedSec)}
          </div>
          <ThemeToggle />
        </div>
      </div>

      <ProgressBar value={answered} total={total} color={answered === total ? theme.success : theme.accent} />

      {/* CARTE DE LA QUESTION */}
      <div style={{
        background: theme.bgAlt, border: `1px solid ${theme.border}`,
        borderRadius: '10px', padding: '28px 32px', margin: '24px 0',
      }}>
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: '0.85rem',
          color: theme.textMuted, marginBottom: '12px',
        }}>
          Question {currentIndex + 1}
        </div>
        <div style={{
          fontFamily: "'Source Serif 4', serif", fontSize: '1.1rem',
          color: theme.text, lineHeight: 1.7, marginBottom: '24px',
        }}>
          <RichText text={q.enonce} />
        </div>

        {/* PROPOSITIONS */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
          {q.propositionsShuffled.map((prop, i) => {
            const isSelected = currentAnswer === i;
            return (
              <button key={i} onClick={() => onAnswer(q.id, i)}
                style={{
                  display: 'flex', alignItems: 'flex-start', gap: '12px',
                  background: isSelected ? theme.optionBgSelected : theme.optionBg,
                  color: isSelected ? theme.optionTextSelected : theme.text,
                  border: `2px solid ${isSelected ? theme.optionBgSelected : theme.border}`,
                  borderRadius: '8px', padding: '14px 18px',
                  textAlign: 'left', cursor: 'pointer',
                  fontFamily: "'Source Serif 4', serif", fontSize: '1rem',
                  transition: 'all 0.15s', width: '100%', lineHeight: 1.6,
                }}
                onMouseEnter={e => { if (!isSelected) e.currentTarget.style.background = theme.optionBgHover; }}
                onMouseLeave={e => { if (!isSelected) e.currentTarget.style.background = theme.optionBg; }}>
                <span style={{
                  fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
                  minWidth: '28px', flexShrink: 0,
                  color: isSelected ? theme.optionTextSelected : theme.accent,
                }}>
                  {CONFIG.LETTRES[i]}.
                </span>
                <span style={{ flex: 1 }}>
                  <RichText text={prop} />
                </span>
              </button>
            );
          })}
        </div>

        {currentAnswer !== undefined && (
          <div style={{ marginTop: '16px', textAlign: 'right' }}>
            <button onClick={() => onAnswer(q.id, undefined)}
              style={{
                background: 'none', border: `1px solid ${theme.border}`,
                color: theme.textSecondary, padding: '6px 14px',
                borderRadius: '6px', cursor: 'pointer',
                fontFamily: "'DM Sans', sans-serif", fontSize: '0.85rem',
              }}>
              ✖ Effacer ma réponse
            </button>
          </div>
        )}
      </div>

      {/* NAVIGATION PREV/NEXT */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        gap: '12px', flexWrap: 'wrap', marginBottom: '32px',
      }}>
        <Button variant="secondary"
          disabled={currentIndex === 0}
          onClick={() => onNavigate(currentIndex - 1)}
          icon="←">
          Précédent
        </Button>
        <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
          {answered < total && (
            <Button variant="ghost" onClick={jumpToFirstUnanswered}>
              🔍 Aller à la 1<sup>re</sup> non répondue
            </Button>
          )}
          <Button variant="success" onClick={onSubmitRequest} icon="📤">
            Soumettre mes réponses
          </Button>
        </div>
        <Button variant="secondary"
          disabled={currentIndex === total - 1}
          onClick={() => onNavigate(currentIndex + 1)}>
          Suivant →
        </Button>
      </div>

      {/* GRILLE DE NAVIGATION — vue d'ensemble */}
      <div style={{
        background: theme.bgAlt, border: `1px solid ${theme.border}`,
        borderRadius: '8px', padding: '16px',
      }}>
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: '0.85rem',
          color: theme.textSecondary, marginBottom: '10px', fontWeight: 500,
        }}>
          Navigation rapide — <span style={{ color: theme.success }}>■ répondue</span>
          <span style={{ margin: '0 8px' }}>·</span>
          <span style={{ color: theme.textMuted }}>■ non répondue</span>
          <span style={{ margin: '0 8px' }}>·</span>
          <span style={{ color: theme.accent }}>■ question actuelle</span>
        </div>
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(38px, 1fr))',
          gap: '6px',
        }}>
          {questions.map((qq, i) => {
            const isAnswered = answers[qq.id] !== undefined;
            const isCurrent = i === currentIndex;
            const bg = isCurrent ? theme.accent
                      : isAnswered ? theme.success
                      : theme.bg;
            const fg = (isCurrent || isAnswered) ? '#ffffff' : theme.text;
            return (
              <button key={i} onClick={() => onNavigate(i)}
                style={{
                  background: bg, color: fg,
                  border: `1px solid ${isCurrent ? theme.accent : theme.border}`,
                  borderRadius: '5px', padding: '6px 0',
                  cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
                  fontSize: '0.8rem', fontWeight: 600, transition: 'all 0.15s',
                }}>
                {i + 1}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const [exporting, setExporting] = useState(false);

  const answered = Object.keys(answers).length;
  const total = questions.length;
  const nonAnswered = total - answered;

  const validate = () => {
    const e = {};
    if (!nom.trim()) e.nom = 'Le nom est obligatoire.';
    if (!prenom.trim()) e.prenom = 'Le prénom est obligatoire.';
    if (!email.trim()) e.email = 'L\'email est obligatoire.';

    setErrors(e);
    return Object.keys(e).length === 0;

    if (!validate()) return;

            color: answered === total ? theme.success : theme.warning },
          { label: 'Sans réponse', value: nonAnswered,
            color: nonAnswered === 0 ? theme.success : theme.danger },
          { label: 'Durée totale', value: formatDuration(elapsedSec),
            color: theme.accent },
        ].map((s, i) => (
          <div key={i} style={{
            background: theme.bgAlt, border: `1px solid ${theme.border}`,
            borderRadius: '8px', padding: '16px', textAlign: 'center',

/* ============================================================================
   MACHINE À ÉTATS PRINCIPALE
   ============================================================================ */
function QuizApp() {
  const { theme } = useTheme();
  const [appState, setAppState] = useState('loading'); // loading | home | quiz | review | done | error
  const [questionsData, setQuestionsData] = useState(null); // le JSON brut
  const [quizQuestions, setQuizQuestions] = useState(null); // questions mélangées (persistées)
  const [answers, setAnswers] = useState({}); // { Q01: 0, Q02: 2, ... }
  const [currentIndex, setCurrentIndex] = useState(0);
  const [startIso, setStartIso] = useState(null);
  const [elapsedSec, setElapsedSec] = useState(0);
  const [lastCsv, setLastCsv] = useState(null); // { content, filename, identite }
  const [errorMsg, setErrorMsg] = useState('');

  // -------- Chargement initial du JSON --------
  useEffect(() => {
    fetch(CONFIG.QUESTIONS_URL, { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error(`Impossible de charger ${CONFIG.QUESTIONS_URL} (HTTP ${r.status})`);
        return r.json();
      })
      .then(data => {
        if (!data.questions || !Array.isArray(data.questions)) {
          throw new Error('Format invalide : la clé "questions" est absente ou mal formée.');
        }
        setQuestionsData(data);

        // Restauration éventuelle d'un QCM en cours
        const savedQuiz = Storage.get('quiz_questions');
        const savedAnswers = Storage.get('quiz_answers');
        const savedStart = Storage.get('quiz_start');
        const savedCurrent = Storage.get('quiz_current');
        if (savedQuiz && Array.isArray(savedQuiz) && savedQuiz.length === data.questions.length) {
          setQuizQuestions(savedQuiz);
          setAnswers(savedAnswers || {});
          setStartIso(savedStart || new Date().toISOString());
          setCurrentIndex(typeof savedCurrent === 'number' ? savedCurrent : 0);
        }
        setAppState('home');
      })
      .catch(err => {
        setErrorMsg(err.message);
        setAppState('error');
      });
  }, []);

  // -------- Chronomètre --------
  useEffect(() => {
    if (appState !== 'quiz' && appState !== 'review') return;
    if (!startIso) return;
    const tick = () => {
      const elapsed = (new Date() - new Date(startIso)) / 1000;
      setElapsedSec(Math.max(0, elapsed));
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [appState, startIso]);

  // -------- Persistance dans localStorage --------
  useEffect(() => {
    if (quizQuestions) Storage.set('quiz_questions', quizQuestions);
  }, [quizQuestions]);
  useEffect(() => { Storage.set('quiz_answers', answers); }, [answers]);
  useEffect(() => { if (startIso) Storage.set('quiz_start', startIso); }, [startIso]);
  useEffect(() => { Storage.set('quiz_current', currentIndex); }, [currentIndex]);

  // -------- Démarrage (nouveau) --------
  const startQuiz = useCallback(() => {
    if (!questionsData) return;
    // Mélange des questions
    const { shuffled: qShuffled, permutation: qPerm } = shuffleWithPermutation(questionsData.questions);
    // Pour chaque question, on mélange aussi les propositions et on stocke la permutation
    const prepared = qShuffled.map((q, idxInQuiz) => {
      const { shuffled: pShuffled, permutation: pPerm } = shuffleWithPermutation(q.propositions);
      return {
        ...q,
        propositionsShuffled: pShuffled,
        permutationPropositions: pPerm, // permutation[i] = index original de la proposition placée en i
        ordreOriginal: qPerm[idxInQuiz], // utile pour reconstruire
      };
    });
    setQuizQuestions(prepared);
    setAnswers({});
    setCurrentIndex(0);
    setStartIso(new Date().toISOString());
    setAppState('quiz');
  }, [questionsData]);

  const resumeQuiz = useCallback(() => {
    setAppState('quiz');
  }, []);

  const resetQuiz = useCallback(() => {
    if (!confirm('Cette action supprime vos réponses en cours et réinitialise le QCM. Continuer ?')) return;
    Storage.clearAllQuizData();
    setQuizQuestions(null);
    setAnswers({});
    setCurrentIndex(0);
    setStartIso(null);
    setElapsedSec(0);
    setAppState('home');
  }, []);

  const handleAnswer = useCallback((questionId, shuffledIndex) => {
    setAnswers(prev => {
      const next = { ...prev };
      if (shuffledIndex === undefined) delete next[questionId];
      else next[questionId] = shuffledIndex;
      return next;
    });
  }, []);

  const handleNavigate = useCallback((idx) => {
    if (!quizQuestions) return;
    if (idx < 0) idx = 0;
    if (idx >= quizQuestions.length) idx = quizQuestions.length - 1;
    setCurrentIndex(idx);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [quizQuestions]);

  const handleSubmitRequest = useCallback(() => {
    setAppState('review');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  // -------- Export CSV --------
  const handleExport = useCallback(async ({ nom, prenom, email }) => {
    if (!quizQuestions) return;
    const endIso = new Date().toISOString();
    const dureeSec = Math.round((new Date(endIso) - new Date(startIso)) / 1000);

    // Construction des lignes réponses
    const answerRows = quizQuestions.map((q, i) => {
      const chosenShuffledIdx = answers[q.id]; // index dans propositionsShuffled
      const chosenOriginalIdx = chosenShuffledIdx !== undefined
        ? q.permutationPropositions[chosenShuffledIdx]
        : undefined;
      const chosenLetter = chosenShuffledIdx !== undefined ? CONFIG.LETTRES[chosenShuffledIdx] : '';
      return {
        ordre: i + 1,
        id: q.id,
        difficulte: q.difficulte,
        type: q.type,
        jour: q.jour,
        enonceTronque: troncateEnonce(q.enonce),
        permutation: q.permutationPropositions.join('|'),
        lettreChoisie: chosenLetter,
        indexOriginalChoisi: chosenOriginalIdx === undefined ? '' : chosenOriginalIdx,
      };
    });

    // Construction du corps des données à signer
    const dataToSign = [
      nom, prenom, email, startIso, endIso, String(dureeSec),
      String(quizQuestions.length), CONFIG.SALT,
      ...answerRows.map(r => `${r.ordre}|${r.id}|${r.permutation}|${r.indexOriginalChoisi}`),
    ].join('||');
    const signature = await sha256Hex(dataToSign);

    // Construction du CSV
    const lines = [];
    lines.push('# CSV d\'evaluation QCM Jours 1-2 - IPSSI Bachelor 2 Info');
    lines.push('# Ne pas modifier ce fichier (signe par hash SHA-256)');
    lines.push('# Auteur du module : Mohamed EL AFRIT (m.elafrit@ecole-ipssi.net)');
    lines.push('#');
    lines.push('# SECTION: METADATA');
    lines.push('cle,valeur');
    const meta = [
      ['Nom', nom], ['Prenom', prenom], ['Email', email],
      ['DateDebut', startIso], ['DateFin', endIso], ['DureeSec', dureeSec],
      ['NbQuestions', quizQuestions.length], ['Version', '1.0'],
      ['SaltVersion', CONFIG.SALT],
    ];
    meta.forEach(([k, v]) => lines.push(`${csvCell(k)},${csvCell(v)}`));
    lines.push('#');
    lines.push('# SECTION: REPONSES');
    lines.push('Ordre,IDQuestion,Difficulte,Type,Jour,EnonceTronque,PermutationPropositions,LettreChoisie,IndexOriginalChoisi');
    answerRows.forEach(r => {
      lines.push([
        r.ordre, r.id, r.difficulte, r.type, r.jour,
        csvCell(r.enonceTronque), csvCell(r.permutation),
        r.lettreChoisie, r.indexOriginalChoisi,
      ].join(','));
    });
    lines.push('#');
    lines.push('# SECTION: SIGNATURE');
    lines.push('champ,valeur');
    lines.push(`SHA256,${signature}`);
    const csvContent = lines.join('\n') + '\n';

    // Nom de fichier : IPSSI_NOM_Prenom_QCM_J1J2_YYYYMMDD.csv
    const nomFile = normalizeForFilename(nom);
    const prenomFile = normalizePrenomForFilename(prenom);
    const filename = `IPSSI_${nomFile}_${prenomFile}_QCM_J1J2_${dateStampYMD()}.csv`;

    // Téléchargement
    downloadCsv(csvContent, filename);

    // Nettoyage et bascule vers l'écran final
    setLastCsv({ content: csvContent, filename, identite: { nom, prenom, email } });
    Storage.clearAllQuizData();
    setAppState('done');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [quizQuestions, answers, startIso]);

  const redownload = useCallback(() => {
    if (lastCsv) downloadCsv(lastCsv.content, lastCsv.filename);
  }, [lastCsv]);

  const resetToHome = useCallback(() => {
    Storage.clearAllQuizData();
    setQuizQuestions(null);
    setAnswers({});
    setCurrentIndex(0);
    setStartIso(null);
    setElapsedSec(0);
    setLastCsv(null);
    setAppState('home');
  }, []);

  // -------- RENDU --------
  if (appState === 'loading') {
    return (
      <div style={{ background: theme.bg, minHeight: '100vh', display: 'flex',
                    alignItems: 'center', justifyContent: 'center', color: theme.text }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: '2rem', animation: 'spin 1.5s linear infinite', display: 'inline-block' }}>⚙️</div>
          <div style={{ fontFamily: "'DM Sans', sans-serif", marginTop: '12px' }}>Chargement du QCM…</div>
        </div>
      </div>
    );
  }

  if (appState === 'error') {
    return (
      <div style={{ background: theme.bg, minHeight: '100vh', padding: '40px',
                    color: theme.text, maxWidth: '720px', margin: '0 auto' }}>
        <h1 style={{ fontFamily: "'DM Sans', sans-serif", color: theme.danger }}>
          ⚠️ Erreur de chargement
        </h1>
        <p>{errorMsg}</p>
        <Box type="attention" title="Que faire ?">
          <p>Vérifiez que le fichier <code>questions.json</code> est bien présent dans le même répertoire
          que cette page HTML. Si le problème persiste, contactez l'enseignant :{' '}
          <a href={`mailto:${CONFIG.EMAIL_DEST}`} style={{ color: theme.link }}>{CONFIG.EMAIL_DEST}</a>.</p>
        </Box>
      </div>
    );
  }

  const hasInProgress = !!quizQuestions && Object.keys(answers).length > 0 && appState === 'home';

  return (
    <div style={{ background: theme.bg, minHeight: '100vh', color: theme.text, transition: 'background 0.3s' }}>
      <style>{`
        ::selection { background: ${theme.accent}33; }
        a { color: ${theme.link}; }
        button:focus { outline: 2px solid ${theme.accent}; outline-offset: 2px; }
      `}</style>
      {appState === 'home' && (
        <HomeScreen
          onStart={startQuiz}
          hasInProgress={hasInProgress}
          onResume={resumeQuiz}
          onReset={resetQuiz}
        />
      )}
      {appState === 'quiz' && quizQuestions && (
        <QuizScreen
          questions={quizQuestions}
          answers={answers}
          currentIndex={currentIndex}
          elapsedSec={elapsedSec}
          onAnswer={handleAnswer}
          onNavigate={handleNavigate}
          onSubmitRequest={handleSubmitRequest}
        />
      )}
      {appState === 'review' && quizQuestions && (
        <ReviewScreen
          questions={quizQuestions}
          answers={answers}
          startIso={startIso}
          elapsedSec={elapsedSec}
          onBack={() => setAppState('quiz')}
          onExport={handleExport}
        />
      )}
      {appState === 'done' && lastCsv && (
        <DoneScreen
          filename={lastCsv.filename}
          identite={lastCsv.identite}
          onRedownload={redownload}
          onReset={resetToHome}
        />
      )}
    </div>
  );
}

function downloadCsv(content, filename) {
  // BOM UTF-8 pour Excel
  const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// Point d'entrée
function App() {
  return (
    <ThemeProvider>
      <QuizApp />
    </ThemeProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
